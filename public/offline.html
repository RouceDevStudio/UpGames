<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#07070f">
<title>Sin conexión — UpGames</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        min-height: 100vh;
        background: radial-gradient(ellipse at top, #1a1a2e 0%, #07070f 50%, #000 100%);
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .container {
        max-width: 420px;
        text-align: center;
        animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .icon {
        width: 140px;
        height: 140px;
        margin: 0 auto 30px;
        border-radius: 50%;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 70px;
        box-shadow: 0 20px 60px rgba(99, 102, 241, 0.4);
        animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.05); }
    }

    h1 {
        font-size: 28px;
        font-weight: 800;
        margin-bottom: 12px;
        background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    p {
        color: #a0a0b8;
        font-size: 15px;
        line-height: 1.6;
        margin-bottom: 32px;
    }

    .btn {
        display: inline-block;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: #fff;
        padding: 14px 32px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 600;
        font-size: 15px;
        border: none;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 40px rgba(99, 102, 241, 0.5);
    }

    .btn:active { transform: translateY(0); }

    .hint {
        margin-top: 24px;
        font-size: 13px;
        color: #6b6b85;
    }

    .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.3);
        padding: 8px 16px;
        border-radius: 999px;
        font-size: 13px;
        color: #fca5a5;
        margin-bottom: 24px;
    }

    .status::before {
        content: '';
        width: 8px;
        height: 8px;
        background: #ef4444;
        border-radius: 50%;
        animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.3; }
    }

    .status.online {
        background: rgba(34, 197, 94, 0.15);
        border-color: rgba(34, 197, 94, 0.3);
        color: #86efac;
    }

    .status.online::before {
        background: #22c55e;
        animation: none;
    }
</style>
</head>
<body>
<div class="container">
    <div class="icon">📡</div>

    <div class="status" id="status">Sin conexión a Internet</div>

    <h1>Ups, estás sin conexión</h1>
    <p>
        Parece que perdiste la conexión a Internet.<br>
        Verifica tu conexión e intenta de nuevo.<br>
        Algunas secciones pueden seguir funcionando con contenido en caché.
    </p>

    <button class="btn" onclick="reintentar()">🔄 Reintentar</button>

    <div class="hint">
        UpGames funciona mejor con conexión a Internet activa.
    </div>
</div>

<script>
    const statusEl = document.getElementById('status');

    function actualizarEstado() {
        if (navigator.onLine) {
            statusEl.textContent = 'Conexión restablecida ✓';
            statusEl.classList.add('online');
            setTimeout(() => location.href = './biblioteca.html', 1000);
        } else {
            statusEl.textContent = 'Sin conexión a Internet';
            statusEl.classList.remove('online');
        }
    }

    function reintentar() {
        if (navigator.onLine) {
            location.href = './biblioteca.html';
        } else {
            statusEl.style.animation = 'none';
            setTimeout(() => statusEl.style.animation = '', 10);
        }
    }

    window.addEventListener('online',  actualizarEstado);
    window.addEventListener('offline', actualizarEstado);
    actualizarEstado();

    // Auto-retry cada 15 segundos
    setInterval(() => { if (navigator.onLine) actualizarEstado(); }, 15000);
</script>
</body>
</html>
