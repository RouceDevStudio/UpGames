<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#07070f">
  <title>Chats — UpGames</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://unpkg.com">
  <style>
/* ═══════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════ */
:root {
  --g:      #5EFF43;
  --g-dim:  rgba(94,255,67,.12);
  --cy:     #00f2ff;
  --cy-dim: rgba(0,242,255,.1);
  --bg:     #07070f;
  --bg1:    #0d0d1a;
  --bg2:    #12121f;
  --bg3:    #191927;
  --bd:     rgba(255,255,255,.07);
  --bd-g:   rgba(94,255,67,.2);
  --txt:    #f0f0f8;
  --txt2:   #9090aa;
  --txt3:   #555570;
  --ease:   cubic-bezier(.4,0,.2,1);
  --spring: cubic-bezier(.34,1.4,.64,1);
  --ff:     'Manrope', -apple-system, sans-serif;
  --ff-mono:'DM Mono', monospace;
  --hdr-h:  56px;
  --send-bg:#1a2e1a;
  --recv-bg:#1a1a2e;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { height:100%; }
body {
  background: var(--bg);
  font-family: var(--ff);
  color: var(--txt);
  height: 100%;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}
button { cursor:pointer; background:none; border:none; color:inherit; font-family:inherit; }
a { text-decoration:none; color:inherit; }
::-webkit-scrollbar { display:none; }
textarea { font-family:inherit; resize:none; }

/* ═══════════════════════════════════════════
   VIEWS — sólo una visible a la vez
═══════════════════════════════════════════ */
#view-list, #view-chat {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  transition: transform .28s var(--ease), opacity .22s;
  will-change: transform;
}
#view-list { z-index: 10; }
#view-chat {
  z-index: 20;
  transform: translateX(100%);
  opacity: 0;
  pointer-events: none;
}
#view-chat.open {
  transform: translateX(0);
  opacity: 1;
  pointer-events: all;
}

/* ═══════════════════════════════════════════
   HEADER — compartido
═══════════════════════════════════════════ */
.chat-header {
  height: var(--hdr-h);
  background: rgba(7,7,15,.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--bd);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 14px;
  flex-shrink: 0;
  z-index: 5;
}
.hdr-back {
  width: 34px; height: 34px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--txt2);
  font-size: 1.15rem;
  transition: background .15s, color .15s;
  flex-shrink: 0;
}
.hdr-back:active { background: var(--bg2); color: var(--g); }
.hdr-logo {
  font-family: 'Bebas Neue', var(--ff);
  font-size: 1.4rem;
  letter-spacing: 2.5px;
}
.hdr-logo .up { color: var(--g); }
.hdr-logo .gm { color: var(--txt); }
.hdr-title {
  font-size: .95rem;
  font-weight: 800;
  color: var(--txt);
  letter-spacing: .3px;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.hdr-sub {
  font-size: .65rem;
  color: var(--txt3);
  font-family: var(--ff-mono);
}
.hdr-contact {
  display: flex;
  flex-direction: column;
  gap: 1px;
  flex: 1;
  min-width: 0;
}
.hdr-actions { display:flex; align-items:center; gap:6px; margin-left:auto; }
.hdr-icon-btn {
  width:34px; height:34px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  color: var(--txt2); font-size:1.1rem;
  transition: background .15s, color .15s;
}
.hdr-icon-btn:active { background:var(--bg2); color:var(--g); }

/* Nuevo chat badge en header */
.hdr-new-chat-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  border-radius: 10px;
  background: var(--g-dim);
  border: 1px solid var(--bd-g);
  color: var(--g);
  font-size: .72rem;
  font-weight: 700;
  transition: background .15s;
}
.hdr-new-chat-btn:active { background: rgba(94,255,67,.2); }

/* ═══════════════════════════════════════════
   BANNER DE AVISO — chats temporales
═══════════════════════════════════════════ */
.temp-banner {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 14px;
  background: rgba(255,204,0,.07);
  border-bottom: 1px solid rgba(255,204,0,.15);
  font-size: .73rem;
  line-height: 1.5;
  color: #ffdd55;
  flex-shrink: 0;
}
.temp-banner ion-icon { font-size: 1.1rem; flex-shrink:0; margin-top:1px; }
.temp-banner-text { flex:1; }
.temp-banner-text strong { display:block; font-size:.75rem; margin-bottom:1px; }
.temp-banner-close {
  flex-shrink: 0;
  color: rgba(255,221,85,.5);
  font-size: 1rem;
  padding: 2px;
  margin-left: 4px;
  transition: color .15s;
}
.temp-banner-close:active { color: #ffdd55; }

/* ═══════════════════════════════════════════
   BUSCADOR (lista)
═══════════════════════════════════════════ */
.search-bar-wrap {
  padding: 10px 12px 6px;
  flex-shrink: 0;
}
.search-inner {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: 12px;
  padding: 8px 12px;
  transition: border-color .2s;
}
.search-inner:focus-within { border-color: rgba(94,255,67,.3); }
.search-inner ion-icon { color: var(--txt3); font-size: 1rem; flex-shrink:0; }
.search-inner input {
  flex:1; background:none; border:none; outline:none;
  color: var(--txt); font-size:.83rem; font-family:var(--ff);
}
.search-inner input::placeholder { color: var(--txt3); }

/* ═══════════════════════════════════════════
   LISTA DE CONVERSACIONES
═══════════════════════════════════════════ */
#conv-list {
  flex: 1;
  overflow-y: auto;
}

.conv-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--bd);
  transition: background .15s;
  position: relative;
  -webkit-tap-highlight-color: transparent;
}
.conv-item:active { background: var(--bg2); }
.conv-item.unread { background: rgba(94,255,67,.025); }

.conv-avatar {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--g), var(--cy));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
  font-weight: 900;
  color: #000;
  flex-shrink: 0;
  position: relative;
}
.conv-online-dot {
  position: absolute;
  bottom: 2px; right: 2px;
  width: 11px; height: 11px;
  border-radius: 50%;
  background: var(--g);
  border: 2px solid var(--bg);
}

.conv-body {
  flex: 1;
  min-width: 0;
}
.conv-row1 {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  margin-bottom: 3px;
}
.conv-name {
  font-size: .88rem;
  font-weight: 700;
  color: var(--txt);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.conv-time {
  font-size: .63rem;
  color: var(--txt3);
  font-family: var(--ff-mono);
  flex-shrink: 0;
}
.conv-row2 {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.conv-last-msg {
  font-size: .75rem;
  color: var(--txt3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.conv-last-msg.mine { color: var(--txt3); }
.conv-last-msg.mine::before { content: 'Tú: '; }
.conv-unread-badge {
  background: var(--g);
  color: #000;
  font-size: .6rem;
  font-weight: 900;
  min-width: 18px;
  height: 18px;
  border-radius: 999px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 5px;
  flex-shrink: 0;
  animation: badgePop .2s var(--spring);
}
@keyframes badgePop { from{transform:scale(0)} to{transform:scale(1)} }

/* Empty state */
.empty-chats {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  gap: 14px;
  text-align: center;
}
.empty-chats ion-icon { font-size: 3.5rem; color: var(--txt3); opacity: .35; }
.empty-chats h3 { font-size: 1rem; font-weight: 700; color: var(--txt2); }
.empty-chats p  { font-size: .8rem; color: var(--txt3); line-height: 1.6; max-width: 280px; }
.empty-chats a {
  margin-top: 4px;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 11px 22px;
  background: var(--g);
  color: #000;
  border-radius: 12px;
  font-size: .8rem;
  font-weight: 800;
  transition: opacity .15s;
}
.empty-chats a:active { opacity: .8; }

/* ═══════════════════════════════════════════
   VISTA DE CHAT INDIVIDUAL
═══════════════════════════════════════════ */
#chat-contact-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--g), var(--cy));
  display: flex; align-items: center; justify-content: center;
  font-size: .8rem; font-weight: 900; color: #000;
  flex-shrink: 0;
}

/* Fondo de mensajes */
#chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px 8px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  background:
    radial-gradient(ellipse 80% 60% at 90% 10%, rgba(94,255,67,.03), transparent 60%),
    radial-gradient(ellipse 60% 60% at 10% 90%, rgba(0,242,255,.03), transparent 60%),
    var(--bg);
}

/* Separador de fecha */
.msg-date-sep {
  align-self: center;
  font-size: .62rem;
  color: var(--txt3);
  background: var(--bg2);
  border: 1px solid var(--bd);
  padding: 3px 12px;
  border-radius: 999px;
  margin: 8px 0 4px;
  font-family: var(--ff-mono);
  letter-spacing: .3px;
}

/* Burbuja */
.msg-bubble-wrap {
  display: flex;
  flex-direction: column;
  max-width: 78%;
  animation: bubbleIn .18s var(--ease);
}
@keyframes bubbleIn {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}
.msg-bubble-wrap.sent  { align-self: flex-end; align-items: flex-end; }
.msg-bubble-wrap.recv  { align-self: flex-start; align-items: flex-start; }

.msg-bubble {
  padding: 9px 13px;
  border-radius: 18px;
  font-size: .85rem;
  line-height: 1.45;
  word-break: break-word;
  position: relative;
}
.msg-bubble-wrap.sent .msg-bubble {
  background: #1d3a1d;
  border: 1px solid rgba(94,255,67,.15);
  color: #e0ffe0;
  border-bottom-right-radius: 5px;
}
.msg-bubble-wrap.recv .msg-bubble {
  background: var(--bg2);
  border: 1px solid var(--bd);
  color: var(--txt);
  border-bottom-left-radius: 5px;
}
/* Curvatura del rabo de burbuja */
.msg-bubble-wrap.sent  .msg-bubble::after {
  content: '';
  position: absolute;
  bottom: 0; right: -6px;
  border: 7px solid transparent;
  border-left-color: #1d3a1d;
  border-bottom-color: #1d3a1d;
  border-right: none;
  border-top: none;
}
.msg-bubble-wrap.recv .msg-bubble::after {
  content: '';
  position: absolute;
  bottom: 0; left: -6px;
  border: 7px solid transparent;
  border-right-color: var(--bg2);
  border-bottom-color: var(--bg2);
  border-left: none;
  border-top: none;
}

.msg-time {
  font-size: .6rem;
  color: var(--txt3);
  font-family: var(--ff-mono);
  margin-top: 3px;
  padding: 0 2px;
  display: flex;
  align-items: center;
  gap: 4px;
}
/* Checks de mensaje leído */
.msg-check { color: var(--cy); font-size: .7rem; }

/* Mensajes seguidos del mismo emisor */
.msg-bubble-wrap.sent  + .msg-bubble-wrap.sent  .msg-bubble { border-bottom-right-radius: 5px; }
.msg-bubble-wrap.recv  + .msg-bubble-wrap.recv  .msg-bubble { border-bottom-left-radius: 5px; }
.msg-bubble-wrap.sent  + .msg-bubble-wrap.sent  .msg-bubble::after  { display:none; }
.msg-bubble-wrap.recv  + .msg-bubble-wrap.recv  .msg-bubble::after  { display:none; }
.msg-bubble-wrap.sent  + .msg-bubble-wrap.recv,
.msg-bubble-wrap.recv  + .msg-bubble-wrap.sent  { margin-top: 8px; }

/* ═══════════════════════════════════════════
   BARRA DE ENTRADA
═══════════════════════════════════════════ */
.chat-input-bar {
  padding: 8px 10px;
  background: rgba(7,7,15,.95);
  border-top: 1px solid var(--bd);
  display: flex;
  align-items: flex-end;
  gap: 8px;
  flex-shrink: 0;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
}
.chat-input-wrap {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: 22px;
  padding: 8px 14px;
  display: flex;
  align-items: flex-end;
  gap: 8px;
  transition: border-color .2s;
}
.chat-input-wrap:focus-within { border-color: rgba(94,255,67,.3); }
#chat-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--txt);
  font-size: .88rem;
  max-height: 120px;
  overflow-y: auto;
  padding: 0;
  line-height: 1.45;
}
#chat-input::placeholder { color: var(--txt3); }
.btn-send {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--g);
  color: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
  transition: transform .15s var(--spring), opacity .15s;
  box-shadow: 0 4px 16px rgba(94,255,67,.25);
}
.btn-send:active { transform: scale(.88); opacity:.8; }
.btn-send:disabled { opacity:.3; transform:none; box-shadow:none; cursor:default; }

/* ═══════════════════════════════════════════
   MODAL — inicio de chat (aviso temporal)
═══════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 500;
  display: flex; align-items: flex-end;
  opacity: 0; visibility: hidden;
  transition: opacity .25s, visibility .25s;
}
.modal-overlay.show { opacity:1; visibility:visible; }
.modal-sheet {
  width: 100%;
  background: var(--bg1);
  border-radius: 20px 20px 0 0;
  border: 1px solid var(--bd);
  border-bottom: none;
  padding: 20px 20px 32px;
  transform: translateY(100%);
  transition: transform .3s var(--spring);
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.modal-overlay.show .modal-sheet { transform: translateY(0); }
.modal-handle {
  width: 36px; height: 4px;
  background: var(--bd);
  border-radius: 2px;
  margin: 0 auto 4px;
}
.modal-icon {
  font-size: 2.4rem;
  text-align: center;
}
.modal-title {
  font-size: 1.05rem;
  font-weight: 800;
  color: var(--txt);
  text-align: center;
}
.modal-body {
  font-size: .82rem;
  color: var(--txt2);
  line-height: 1.6;
  text-align: center;
}
.modal-warn {
  background: rgba(255,204,0,.07);
  border: 1px solid rgba(255,204,0,.2);
  border-radius: 12px;
  padding: 12px 14px;
  font-size: .78rem;
  color: #ffdd55;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  line-height: 1.5;
}
.modal-warn ion-icon { font-size: 1rem; flex-shrink:0; margin-top:1px; }
.modal-btn {
  width: 100%;
  padding: 13px;
  border-radius: 13px;
  font-size: .88rem;
  font-weight: 800;
  transition: opacity .15s;
}
.modal-btn.primary {
  background: var(--g);
  color: #000;
  box-shadow: 0 4px 16px rgba(94,255,67,.2);
}
.modal-btn.secondary {
  background: var(--bg2);
  color: var(--txt2);
  border: 1px solid var(--bd);
}
.modal-btn:active { opacity: .8; }

/* ═══════════════════════════════════════════
   ANIMACIÓN spinAnim (para futuros loaders)
═══════════════════════════════════════════ */
@keyframes spinAnim { to { transform:rotate(360deg); } }

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
#toast-box {
  position: fixed; bottom: 70px; left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  pointer-events: none;
  display: flex; flex-direction: column; gap: 6px; align-items: center;
}
.toast-item {
  background: var(--bg3);
  color: var(--txt);
  padding: 9px 18px;
  border-radius: 999px;
  font-size: .78rem;
  font-weight: 700;
  border: 1px solid var(--bd);
  white-space: nowrap;
  animation: toastIn .28s var(--spring);
  box-shadow: 0 6px 20px rgba(0,0,0,.5);
}
@keyframes toastIn { from{opacity:0;transform:translateY(6px) scale(.95)} to{opacity:1;transform:none} }
.toast-item.out { animation: toastOut .25s var(--ease) forwards; }
@keyframes toastOut { to{opacity:0;transform:translateY(3px) scale(.95)} }
  </style>
</head>
<body>

<!-- ══════════════════════════════════
  VISTA: LISTA DE CHATS
══════════════════════════════════ -->
<div id="view-list">

  <!-- Header -->
  <header class="chat-header">
    <a href="./biblioteca.html" class="hdr-back" aria-label="Volver">
      <ion-icon name="arrow-back-outline"></ion-icon>
    </a>
    <div class="hdr-logo"><span class="up">UP</span><span class="gm">GAMES</span></div>
    <div class="hdr-title" style="flex:1;margin-left:6px">Mensajes</div>
    <div id="hdr-unread-total" style="display:none;
      background:var(--g);color:#000;font-size:.65rem;font-weight:900;
      min-width:20px;height:20px;border-radius:999px;
      display:none;align-items:center;justify-content:center;padding:0 5px">0</div>
  </header>

  <!-- Buscador + botón vaciar -->
  <div class="search-bar-wrap" style="display:flex;gap:8px;align-items:center;">
    <div class="search-inner" style="flex:1">
      <ion-icon name="search-outline"></ion-icon>
      <input type="text" id="list-search" placeholder="Buscar conversación..." oninput="filterConvList(this.value)" autocomplete="off">
    </div>
    <button id="btn-vaciar-todo" onclick="vaciarTodosChats()" title="Vaciar todos los chats"
      style="flex-shrink:0;width:38px;height:38px;border-radius:10px;border:1px solid rgba(255,67,67,.25);
        background:rgba(255,67,67,.08);color:#ff6b6b;display:flex;align-items:center;justify-content:center;
        font-size:1.1rem;cursor:pointer;transition:background .15s;">
      <ion-icon name="trash-outline"></ion-icon>
    </button>
  </div>

  <!-- Lista -->
  <div id="conv-list"></div>

</div><!-- /#view-list -->


<!-- ══════════════════════════════════
  VISTA: CHAT INDIVIDUAL
══════════════════════════════════ -->
<div id="view-chat">

  <!-- Header del chat -->
  <header class="chat-header">
    <button class="hdr-back" onclick="closeChat()" aria-label="Volver a chats">
      <ion-icon name="arrow-back-outline"></ion-icon>
    </button>
    <div id="chat-contact-avatar" class="conv-avatar" style="width:34px;height:34px;font-size:.85rem;">?</div>
    <div class="hdr-contact">
      <div class="hdr-title" id="chat-contact-name">Usuario</div>
      <div class="hdr-sub" id="chat-contact-status">En línea</div>
    </div>
    <div class="hdr-actions">
      <button class="hdr-icon-btn" onclick="goToProfile()" title="Ver perfil" aria-label="Ver perfil">
        <ion-icon name="person-circle-outline"></ion-icon>
      </button>
      <button class="hdr-icon-btn" onclick="confirmDeleteContact()" title="Eliminar contacto" aria-label="Eliminar contacto"
        style="color:#ff6b6b">
        <ion-icon name="person-remove-outline"></ion-icon>
      </button>
      <button class="hdr-icon-btn" onclick="confirmDeleteChat()" title="Borrar mensajes" aria-label="Borrar mensajes">
        <ion-icon name="trash-outline"></ion-icon>
      </button>
    </div>
  </header>

  <!-- Área de mensajes -->
  <div id="chat-messages"></div>

  <!-- Barra de entrada -->
  <div class="chat-input-bar">
    <div class="chat-input-wrap">
      <textarea id="chat-input" placeholder="Escribe un mensaje..." rows="1"
        oninput="autoResizeInput(this)" onkeydown="handleInputKey(event)"></textarea>
    </div>
    <button class="btn-send" id="btn-send" onclick="sendMessage()" aria-label="Enviar">
      <ion-icon name="send"></ion-icon>
    </button>
  </div>

</div><!-- /#view-chat -->


<!-- ══════════════════════════════════
  MODAL — confirmación genérica
══════════════════════════════════ -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-icon" id="confirm-modal-icon">⚠️</div>
    <div class="modal-title" id="confirm-modal-title"></div>
    <div class="modal-body" id="confirm-modal-body"></div>
    <button class="modal-btn primary" id="confirm-modal-ok" style="background:rgba(255,67,67,.15);border-color:rgba(255,67,67,.3);color:#ff4343;">
      Confirmar
    </button>
    <button class="modal-btn secondary" onclick="closeConfirmModal()">Cancelar</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast-box"></div>

<!-- Ionicons -->
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

<script>
/* ═══════════════════════════════════════════════════
   CHATS — UpGames · API Real + Polling + Notificaciones
═══════════════════════════════════════════════════ */
const API_URL = 'https://upgames-production.up.railway.app';
const ME      = localStorage.getItem('user_admin') || '';
const TOKEN   = localStorage.getItem('token')      || '';

if (!ME || !TOKEN) { location.replace('../index.html'); }

let currentContact  = null;
let allContacts     = [];
let pollingTimer    = null;
let lastMsgTs       = 0;   // timestamp del último mensaje recibido (polling incremental)

// ── Helpers ──────────────────────────────────────────
function authH() {
  return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` };
}
function escapeHTML(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function avatarLetter(u) { return (u || '?')[0].toUpperCase(); }
function fmtTime(iso) {
  const d = new Date(iso), now = new Date(), diff = now - d;
  const M=60000, H=3600000, D=86400000;
  if (diff < M)     return 'ahora';
  if (diff < H)     return Math.floor(diff/M) + 'm';
  if (diff < D)     return d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  if (diff < D*2)   return 'ayer';
  if (diff < D*7)   return ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'][d.getDay()];
  return d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'});
}
function fmtHour(iso) {
  return new Date(iso).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
}
function fmtDateSep(iso) {
  const d = new Date(iso), now = new Date(), diff = now - d;
  if (diff < 86400000 && now.getDate()===d.getDate()) return 'Hoy';
  if (diff < 172800000) return 'Ayer';
  return d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
}
function toast(msg, dur=2600) {
  const box = document.getElementById('toast-box');
  const t = document.createElement('div');
  t.className = 'toast-item';
  t.textContent = msg;
  box.appendChild(t);
  setTimeout(()=>{ t.classList.add('out'); setTimeout(()=>t.remove(),280); }, dur);
}

// ── Modal de confirmación ─────────────────────────────
let _confirmCb = null;
function showConfirm(icon, title, body, cb) {
  document.getElementById('confirm-modal-icon').textContent  = icon;
  document.getElementById('confirm-modal-title').textContent = title;
  document.getElementById('confirm-modal-body').innerHTML    = body;
  _confirmCb = cb;
  document.getElementById('confirm-modal-ok').onclick = () => { closeConfirmModal(); cb && cb(); };
  document.getElementById('confirm-modal').classList.add('show');
}
function closeConfirmModal() {
  document.getElementById('confirm-modal').classList.remove('show');
}
document.getElementById('confirm-modal').addEventListener('click', function(e) {
  if (e.target === this) closeConfirmModal();
});

// ══════════════════════════════════════════════════════
// LISTA DE CONVERSACIONES (polling cada 8s)
// ══════════════════════════════════════════════════════
async function loadConvList() {
  try {
    const r = await fetch(`${API_URL}/chat/conversaciones`, { headers: authH() });
    if (!r.ok) return;
    const data = await r.json();
    if (!data.success) return;
    allContacts = data.conversaciones || [];
    renderConvList(document.getElementById('list-search')?.value || '');
  } catch (_) {}
}

function renderConvList(filter = '') {
  const listEl = document.getElementById('conv-list');
  const q = filter.toLowerCase().trim();

  const filtered = q
    ? allContacts.filter(c => c.contacto.toLowerCase().includes(q))
    : allContacts;

  // Badge total no leídos
  const totalUnread = allContacts.reduce((a, c) => a + (c.noLeidos || 0), 0);
  const badge = document.getElementById('hdr-unread-total');
  if (badge) {
    badge.style.display = totalUnread > 0 ? 'flex' : 'none';
    badge.textContent = totalUnread > 99 ? '99+' : totalUnread;
  }

  if (!filtered.length) {
    listEl.innerHTML = '';
    const empty = document.createElement('div');
    empty.className = 'empty-chats';
    empty.innerHTML = q
      ? `<ion-icon name="search-outline"></ion-icon><h3>Sin resultados</h3><p>No hay chat con "<strong>${q}</strong>"</p>`
      : `<ion-icon name="chatbubbles-outline"></ion-icon><h3>Sin conversaciones</h3>
         <p>Visita el perfil de alguien que sigas y toca <strong>Mensaje</strong>.</p>
         <a href="./biblioteca.html"><ion-icon name="arrow-back-outline"></ion-icon> Ir a la Biblioteca</a>`;
    listEl.appendChild(empty);
    return;
  }

  listEl.innerHTML = '';
  filtered.forEach(({ contacto, ultimoMensaje, noLeidos }) => {
    const item = document.createElement('div');
    item.className = 'conv-item' + (noLeidos > 0 ? ' unread' : '');
    item.dataset.user = contacto;

    const lastText  = ultimoMensaje ? ultimoMensaje.texto.substring(0, 55) : 'Inicia la conversación…';
    const isMine    = ultimoMensaje?.de === ME;
    const timeStr   = ultimoMensaje ? fmtTime(ultimoMensaje.fecha) : '';

    item.innerHTML = `
      <div class="conv-avatar">${avatarLetter(contacto)}</div>
      <div class="conv-body">
        <div class="conv-row1">
          <div class="conv-name">@${contacto}</div>
          <div class="conv-time">${timeStr}</div>
        </div>
        <div class="conv-row2">
          <div class="conv-last-msg ${isMine ? 'mine' : ''}">${isMine ? '↑ ' : ''}${escapeHTML(lastText)}</div>
          ${noLeidos > 0 ? `<div class="conv-unread-badge">${noLeidos > 99 ? '99+' : noLeidos}</div>` : ''}
        </div>
      </div>`;

    item.addEventListener('click', () => openChat(contacto));
    listEl.appendChild(item);
  });
}

function filterConvList(q) { renderConvList(q); }

// ══════════════════════════════════════════════════════
// ABRIR / CERRAR CHAT
// ══════════════════════════════════════════════════════
async function openChat(username) {
  currentContact = username;
  lastMsgTs = 0;

  document.getElementById('chat-contact-avatar').textContent = avatarLetter(username);
  document.getElementById('chat-contact-name').textContent   = '@' + username;
  document.getElementById('chat-contact-status').textContent = 'cargando…';
  document.getElementById('chat-messages').innerHTML = `
    <div style="margin:auto;text-align:center;padding:40px 20px;color:var(--txt3);font-size:.8rem">
      <ion-icon name="ellipsis-horizontal" style="font-size:1.5rem;animation:spinAnim 1s linear infinite"></ion-icon>
    </div>`;

  document.getElementById('view-chat').classList.add('open');

  await fetchMessages(username, true);

  // Polling de mensajes nuevos cada 3s
  clearInterval(pollingTimer);
  pollingTimer = setInterval(() => pollNewMessages(username), 3000);
}

function closeChat() {
  clearInterval(pollingTimer);
  pollingTimer = null;
  currentContact = null;
  document.getElementById('view-chat').classList.remove('open');
  loadConvList();
}

// ══════════════════════════════════════════════════════
// CARGAR / RENDERIZAR MENSAJES
// ══════════════════════════════════════════════════════
async function fetchMessages(username, fullLoad = false) {
  try {
    const url = fullLoad
      ? `${API_URL}/chat/mensajes/${username}`
      : `${API_URL}/chat/mensajes/${username}?desde=${lastMsgTs}`;
    const r = await fetch(url, { headers: authH() });
    if (!r.ok) return;
    const data = await r.json();
    if (!data.success) return;

    const msgs = data.mensajes || [];
    if (!msgs.length && fullLoad) {
      document.getElementById('chat-messages').innerHTML = `
        <div style="margin:auto;text-align:center;padding:40px 20px;color:var(--txt3);font-size:.8rem;line-height:1.6">
          <div style="font-size:2rem;margin-bottom:10px">👋</div>
          <p>Sois mutuamente seguidores.<br>Empieza la conversación.</p>
        </div>`;
      document.getElementById('chat-contact-status').textContent = 'en línea';
      return;
    }

    if (fullLoad) {
      renderAllMessages(msgs);
    } else if (msgs.length) {
      appendNewMessages(msgs);
    }

    // Guardar timestamp del más reciente
    if (msgs.length) {
      lastMsgTs = new Date(msgs[msgs.length - 1].fecha).getTime();
    }
    document.getElementById('chat-contact-status').textContent = 'en línea';
  } catch (_) {
    document.getElementById('chat-contact-status').textContent = 'sin conexión';
  }
}

async function pollNewMessages(username) {
  if (currentContact !== username) return;
  await fetchMessages(username, false);
}

function renderAllMessages(msgs) {
  const container = document.getElementById('chat-messages');
  container.innerHTML = '';
  let lastDate = null;
  msgs.forEach((msg, i) => {
    const dateStr = fmtDateSep(msg.fecha);
    if (dateStr !== lastDate) {
      lastDate = dateStr;
      const sep = document.createElement('div');
      sep.className = 'msg-date-sep';
      sep.textContent = dateStr;
      container.appendChild(sep);
    }
    const next   = msgs[i + 1];
    const showTs = !next || next.de !== msg.de || (new Date(next.fecha) - new Date(msg.fecha)) > 180000;
    container.appendChild(buildBubble(msg, showTs));
  });
  container.scrollTop = container.scrollHeight;
}

function appendNewMessages(msgs) {
  const container = document.getElementById('chat-messages');
  // Quitar estado vacío
  const emptyEl = container.querySelector('div[style*="margin:auto"]');
  if (emptyEl) emptyEl.remove();

  msgs.forEach(msg => {
    const dateStr = fmtDateSep(msg.fecha);
    const last = container.querySelector('.msg-date-sep:last-of-type');
    if (!last || last.textContent !== dateStr) {
      const sep = document.createElement('div');
      sep.className = 'msg-date-sep';
      sep.textContent = dateStr;
      container.appendChild(sep);
    }
    container.appendChild(buildBubble(msg, true));
  });
  container.scrollTop = container.scrollHeight;

  // Notificación si no está en foco
  const recibidos = msgs.filter(m => m.de !== ME);
  if (recibidos.length && document.hidden) {
    const ultimo = recibidos[recibidos.length - 1];
    if (Notification.permission === 'granted') {
      new Notification(`💬 Mensaje de @${ultimo.de}`, {
        body: ultimo.texto.substring(0, 80),
        icon: '/favicon.png',
        tag:  'chat-' + ultimo.de,
        renotify: true
      });
    }
  }
}

function buildBubble(msg, showTs) {
  const isMine = msg.de === ME;
  const wrap = document.createElement('div');
  wrap.className = `msg-bubble-wrap ${isMine ? 'sent' : 'recv'}`;
  wrap.dataset.id = msg.id;
  wrap.innerHTML = `
    <div class="msg-bubble">${escapeHTML(msg.texto).replace(/\n/g,'<br>')}</div>
    ${showTs ? `<div class="msg-time">
      ${fmtHour(msg.fecha)}
      ${isMine ? `<ion-icon name="${msg.leido ? 'checkmark-done' : 'checkmark'}-outline" class="msg-check" style="color:${msg.leido ? 'var(--cy)' : 'var(--txt3)'}"></ion-icon>` : ''}
    </div>` : ''}`;
  return wrap;
}

// ══════════════════════════════════════════════════════
// ENVIAR MENSAJE
// ══════════════════════════════════════════════════════
async function sendMessage() {
  if (!currentContact) return;
  const inp  = document.getElementById('chat-input');
  const text = inp.value.trim();
  if (!text) return;

  // Deshabilitar mientras envía
  const btnSend = document.getElementById('btn-send');
  btnSend.disabled = true;
  inp.value = '';
  inp.style.height = 'auto';

  // Burbuja optimista inmediata
  const tempMsg = { id: 'tmp', de: ME, texto: text, leido: false, fecha: new Date().toISOString() };
  appendNewMessages([tempMsg]);

  try {
    const r = await fetch(`${API_URL}/chat/enviar`, {
      method: 'POST',
      headers: authH(),
      body: JSON.stringify({ para: currentContact, texto: text })
    });
    const data = await r.json();
    if (!data.success) {
      toast('❌ ' + (data.error || 'Error al enviar'));
      inp.value = text; // devolver texto si falla
    } else {
      lastMsgTs = new Date(data.mensaje.fecha).getTime();
    }
  } catch (_) {
    toast('❌ Sin conexión');
    inp.value = text;
  } finally {
    btnSend.disabled = false;
  }
}

function autoResizeInput(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// ══════════════════════════════════════════════════════
// ACCIONES — Borrar chat / Eliminar contacto / Vaciar todo
// ══════════════════════════════════════════════════════
function goToProfile() {
  if (currentContact)
    window.location.href = `./perfil-publico.html?usuario=${encodeURIComponent(currentContact)}`;
}

function confirmDeleteChat() {
  if (!currentContact) return;
  showConfirm('🗑️', 'Borrar mensajes',
    `¿Eliminar todos los mensajes con <strong style="color:var(--g)">@${currentContact}</strong>?<br>El contacto seguirá en tu lista.`,
    async () => {
      try {
        await fetch(`${API_URL}/chat/conversacion/${currentContact}`, { method:'DELETE', headers: authH() });
        toast('🗑️ Mensajes eliminados');
        document.getElementById('chat-messages').innerHTML = `
          <div style="margin:auto;text-align:center;padding:40px 20px;color:var(--txt3);font-size:.8rem;line-height:1.6">
            <div style="font-size:2rem;margin-bottom:10px">👋</div>
            <p>Conversación vacía.<br>Empieza de nuevo.</p>
          </div>`;
        lastMsgTs = 0;
      } catch (_) { toast('❌ Error al borrar'); }
    }
  );
}

function confirmDeleteContact() {
  if (!currentContact) return;
  showConfirm('👤', 'Eliminar contacto',
    `¿Quitar a <strong style="color:var(--g)">@${currentContact}</strong> de tus chats y borrar todos los mensajes?`,
    async () => {
      try {
        await fetch(`${API_URL}/chat/conversacion/${currentContact}`, { method:'DELETE', headers: authH() });
        toast('✅ Contacto eliminado');
        closeChat();
        loadConvList();
      } catch (_) { toast('❌ Error'); }
    }
  );
}

function vaciarTodosChats() {
  if (!allContacts.length) { toast('No hay chats que vaciar'); return; }
  showConfirm('⚠️', 'Vaciar todos los chats',
    `¿Eliminar <strong style="color:#ff4343">todos</strong> los mensajes de <strong>${allContacts.length}</strong> conversación(es)?<br>Esta acción no se puede deshacer.`,
    async () => {
      try {
        // Borrar todas en paralelo
        await Promise.all(
          allContacts.map(c =>
            fetch(`${API_URL}/chat/conversacion/${c.contacto}`, { method:'DELETE', headers: authH() })
          )
        );
        toast('✅ Todos los chats eliminados');
        allContacts = [];
        renderConvList();
      } catch (_) { toast('❌ Error al vaciar'); }
    }
  );
}

// ══════════════════════════════════════════════════════
// NOTIFICACIONES PUSH — pedir permiso al abrir
// ══════════════════════════════════════════════════════
function requestNotifPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
async function init() {
  requestNotifPermission();
  await loadConvList();

  // Polling lista cada 8s
  setInterval(loadConvList, 8000);

  // Si viene con ?usuario=X, abrir directamente
  const target = new URLSearchParams(window.location.search).get('usuario');
  if (target?.trim()) setTimeout(() => openChat(target.trim()), 120);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
