<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#06060e">
  <title>Mensajes — Vela</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
/* ══════════════════════════════════════
   TOKENS
══════════════════════════════════════ */
:root {
  --g:      #5EFF43;
  --g-dim:  rgba(94,255,67,.1);
  --g-glow: rgba(94,255,67,.22);
  --g-soft: rgba(94,255,67,.06);
  --cy:     #00d4ff;
  --bg:     #06060e;
  --bg1:    #09091a;
  --bg2:    #0d0d1e;
  --bg3:    #131328;
  --bg4:    #181832;
  --bd:     rgba(255,255,255,.065);
  --bd-g:   rgba(94,255,67,.2);
  --txt:    #eeeef8;
  --txt2:   #7878a8;
  --txt3:   #3a3a5e;
  --red:    #ff4466;
  --ff:     'Manrope',system-ui,sans-serif;
  --mono:   'JetBrains Mono',monospace;
  --ease:   cubic-bezier(.4,0,.2,1);
  --spring: cubic-bezier(.34,1.4,.64,1);
  --sb-w:   296px;
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  background:var(--bg);
  font-family:var(--ff);
  color:var(--txt);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}
button { cursor:pointer; background:none; border:none; color:inherit; font-family:inherit; }
a { text-decoration:none; color:inherit; }
input, textarea { font-family:inherit; }
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,.08); border-radius:2px; }
input[type="file"] { display:none; }

/* ══════════════════════════════════════
   SHELL
══════════════════════════════════════ */
#app {
  position:fixed; inset:0;
  display:flex; overflow:hidden;
}

/* ══════════════════════════════════════
   SIDEBAR
══════════════════════════════════════ */
#sidebar {
  width: var(--sb-w);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg1);
  border-right: 1px solid var(--bd);
  position: relative;
  z-index: 20;
  transition: transform .3s var(--ease);
}

/* mobile: sidebar = full screen, slides out when chat opens */
@media (max-width: 720px) {
  #sidebar {
    position: fixed; inset: 0;
    width: 100%;
    transition: transform .3s var(--ease);
  }
  #sidebar.off { transform: translateX(-100%); }
  #chat-area {
    position: fixed; inset: 0;
    z-index: 10;
    transform: translateX(100%);
    transition: transform .3s var(--ease);
  }
  #chat-area.open { transform: translateX(0); }
}

/* sidebar header */
.sb-top {
  display: flex; align-items: center; gap:10px;
  padding: 0 14px;
  height: 58px;
  border-bottom: 1px solid var(--bd);
  flex-shrink: 0;
}
.brand {
  font-size: 1.1rem; font-weight: 900;
  letter-spacing: 3px; flex: 1;
}
.brand .v   { color: var(--g); }
.brand .ela { color: var(--txt3); }
.sb-unread {
  display: none;
  background: var(--g); color: #000;
  font-size: .58rem; font-weight: 900;
  min-width: 18px; height: 18px;
  border-radius: 999px;
  align-items: center; justify-content: center;
  padding: 0 5px;
}
.icon-btn {
  width: 34px; height: 34px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  color: var(--txt2); font-size: 1rem;
  transition: background .15s, color .15s;
}
.icon-btn:hover, .icon-btn:active {
  background: var(--bg3); color: var(--g);
}

/* search */
.sb-search { padding: 10px 12px 6px; flex-shrink: 0; }
.search-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg3);
  border: 1px solid var(--bd);
  border-radius: 12px;
  padding: 9px 12px;
  transition: border-color .2s;
}
.search-box:focus-within { border-color: var(--bd-g); }
.search-box ion-icon { color: var(--txt3); font-size: .9rem; flex-shrink: 0; }
.search-box input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--txt); font-size: .81rem;
}
.search-box input::placeholder { color: var(--txt3); }

/* section label */
.sec-label {
  font-size: .6rem; font-weight: 800;
  color: var(--txt3); text-transform: uppercase;
  letter-spacing: 1.8px;
  padding: 10px 14px 4px;
  flex-shrink: 0;
}

/* conv list */
#conv-list { flex: 1; overflow-y: auto; padding: 4px 0 8px; }

.conv-item {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 12px;
  border-radius: 11px; margin: 1px 6px;
  cursor: pointer;
  transition: background .15s;
  position: relative;
}
.conv-item:hover { background: var(--bg3); }
.conv-item.active {
  background: var(--bg3);
  box-shadow: inset 2px 0 0 var(--g);
}

.c-av {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--g), var(--cy));
  display: flex; align-items: center; justify-content: center;
  font-size: .95rem; font-weight: 900; color: #000;
  flex-shrink: 0; position: relative; overflow: hidden;
}
.c-av img {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
}
.c-online {
  position: absolute; bottom: -2px; right: -2px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--g); border: 2.5px solid var(--bg1);
  box-shadow: 0 0 6px var(--g-glow);
}
.c-body { flex: 1; min-width: 0; }
.c-name {
  font-size: .84rem; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 2px;
}
.c-preview {
  font-size: .71rem; color: var(--txt2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.c-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.c-time { font-size: .62rem; color: var(--txt3); font-family: var(--mono); }
.c-badge {
  background: var(--g); color: #000;
  font-size: .57rem; font-weight: 900;
  min-width: 17px; height: 17px;
  border-radius: 999px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 5px;
  animation: pop .18s var(--spring);
}
@keyframes pop { from { transform: scale(0) } to { transform: scale(1) } }

.conv-empty {
  padding: 32px 20px;
  text-align: center; color: var(--txt3);
}
.conv-empty .ico { font-size: 2rem; margin-bottom: 10px; }
.conv-empty p { font-size: .78rem; line-height: 1.7; }

/* user search results (embedded below convs) */
.usr-result {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  border-radius: 10px; margin: 1px 6px;
  cursor: pointer;
  transition: background .15s;
}
.usr-result:hover { background: var(--bg3); }
.ur-av {
  width: 36px; height: 36px;
  border-radius: 9px;
  background: linear-gradient(135deg, var(--g), var(--cy));
  display: flex; align-items: center; justify-content: center;
  font-size: .82rem; font-weight: 900; color: #000;
  flex-shrink: 0; position: relative; overflow: hidden;
}
.ur-av img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.ur-name { font-size: .82rem; font-weight: 700; }
.ur-sub  { font-size: .67rem; color: var(--txt3); }
.ur-btn {
  margin-left: auto; padding: 5px 11px;
  border-radius: 7px;
  background: var(--g-dim);
  border: 1px solid rgba(94,255,67,.2);
  color: var(--g); font-size: .63rem; font-weight: 800;
  flex-shrink: 0;
  transition: background .15s;
}
.ur-btn:hover { background: rgba(94,255,67,.18); }

/* ══════════════════════════════════════
   CHAT AREA
══════════════════════════════════════ */
#chat-area {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  background: var(--bg);
}

/* empty state */
#empty-state {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px; gap: 14px; text-align: center;
  color: var(--txt3);
}
.es-logo { font-size: 3rem; font-weight: 900; letter-spacing: 4px; }
.es-logo .v { color: var(--g); }
.es-logo .ela { color: var(--txt3); }
.es-hint { font-size: .82rem; line-height: 1.8; max-width: 260px; }

/* chat header */
.ch-hdr {
  height: 58px;
  background: rgba(6,6,14,.97);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; gap: 11px;
  padding: 0 14px;
  flex-shrink: 0; position: relative; z-index: 5;
}
.ch-av {
  width: 36px; height: 36px;
  border-radius: 9px;
  background: linear-gradient(135deg, var(--g), var(--cy));
  display: flex; align-items: center; justify-content: center;
  font-size: .85rem; font-weight: 900; color: #000;
  flex-shrink: 0; position: relative; overflow: hidden;
}
.ch-av img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.ch-info { flex: 1; min-width: 0; }
.ch-name {
  font-size: .9rem; font-weight: 800;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ch-status {
  display: flex; align-items: center; gap: 5px;
  font-size: .66rem; color: var(--txt3); margin-top: 2px;
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--txt3); flex-shrink: 0;
  transition: background .3s, box-shadow .3s;
}
.status-dot.online {
  background: var(--g);
  box-shadow: 0 0 8px var(--g-glow);
  animation: pulse-dot 2.5s infinite;
}
@keyframes pulse-dot {
  0%, 100% { box-shadow: 0 0 4px var(--g-glow); }
  50%       { box-shadow: 0 0 12px var(--g-glow), 0 0 22px rgba(94,255,67,.1); }
}
.ch-actions { display: flex; gap: 3px; margin-left: auto; }

/* messages */
#messages {
  flex: 1; overflow-y: auto;
  padding: 16px 0 8px;
  background:
    radial-gradient(ellipse 70% 35% at 95% 5%, rgba(94,255,67,.025), transparent 60%),
    radial-gradient(ellipse 55% 35% at 5% 95%, rgba(0,212,255,.02), transparent 60%),
    var(--bg);
}

/* date separator */
.msg-date {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 22px 8px;
  font-size: .6rem; color: var(--txt3);
  font-family: var(--mono); text-transform: lowercase;
  letter-spacing: .5px;
}
.msg-date::before, .msg-date::after {
  content: ''; flex: 1;
  height: 1px; background: var(--bd);
}

/* message group — Discord-style */
.msg-group {
  display: flex; gap: 12px;
  padding: 3px 20px;
  transition: background .1s;
  position: relative;
}
.msg-group:hover { background: rgba(255,255,255,.012); }

.grp-av {
  width: 36px; height: 36px;
  border-radius: 9px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--g), var(--cy));
  display: flex; align-items: center; justify-content: center;
  font-size: .82rem; font-weight: 900; color: #000;
  align-self: flex-end;
  position: relative; overflow: hidden;
}
.grp-av img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.msg-group.cont .grp-av { visibility: hidden; }

.grp-body { flex: 1; min-width: 0; }

/* group meta: name + time */
.grp-meta {
  display: flex; align-items: baseline; gap: 8px;
  margin-bottom: 4px;
}
.msg-group.cont .grp-meta { display: none; }
.meta-name { font-size: .78rem; font-weight: 800; color: var(--txt); }
.meta-name.mine { color: var(--g); }
.meta-ts { font-size: .6rem; color: var(--txt3); font-family: var(--mono); }

/* individual message line */
.msg-line {
  display: inline-block;
  max-width: min(540px, 82%);
  padding: 8px 13px;
  border-radius: 4px 14px 14px 14px;
  font-size: .86rem; line-height: 1.52;
  word-break: break-word;
  background: var(--bg2);
  border: 1px solid var(--bd);
  color: var(--txt);
  margin-bottom: 3px;
  transition: border-color .15s;
}
.msg-line.mine {
  border-radius: 14px 4px 14px 14px;
  background: var(--g-soft);
  border-color: rgba(94,255,67,.13);
}
.msg-line:hover { border-color: rgba(255,255,255,.1); }
.msg-line.mine:hover { border-color: rgba(94,255,67,.2); }

/* image in chat */
.msg-img {
  display: block;
  max-width: min(280px, 80%);
  border-radius: 12px; overflow: hidden;
  cursor: pointer; border: 1px solid var(--bd);
  margin-bottom: 4px;
  transition: transform .15s, border-color .15s;
}
.msg-img:hover { transform: scale(.99); border-color: rgba(255,255,255,.15); }
.msg-img.mine { border-color: rgba(94,255,67,.15); }
.msg-img img { width: 100%; height: auto; display: block; max-height: 260px; object-fit: cover; }

/* read receipt */
.msg-read {
  display: flex; align-items: center; gap: 4px;
  font-size: .6rem; color: var(--txt3);
  font-family: var(--mono);
  margin-top: 2px; margin-bottom: 4px;
}
.msg-read.seen { color: var(--cy); }
.msg-read ion-icon { font-size: .72rem; }

/* hover timestamp tip */
.ts-tip {
  position: absolute; right: 20px; top: 50%;
  transform: translateY(-50%);
  background: var(--bg4); color: var(--txt3);
  font-size: .58rem; font-family: var(--mono);
  padding: 3px 8px; border-radius: 6px;
  pointer-events: none; opacity: 0;
  transition: opacity .15s; white-space: nowrap;
  border: 1px solid var(--bd);
}
.msg-group:hover .ts-tip { opacity: 1; }

/* ══════════════════════════════════════
   INPUT BAR
══════════════════════════════════════ */
.input-bar {
  padding: 10px 14px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  background: rgba(6,6,14,.97);
  border-top: 1px solid var(--bd);
  flex-shrink: 0;
  display: flex; flex-direction: column; gap: 8px;
}
.img-preview {
  display: none; align-items: center; gap: 9px;
  padding: 7px 10px;
  background: var(--bg2); border: 1px solid var(--bd);
  border-radius: 10px;
}
.img-preview.show { display: flex; }
.img-preview img { width: 42px; height: 42px; border-radius: 7px; object-fit: cover; flex-shrink: 0; }
.img-preview-name { flex: 1; font-size: .72rem; color: var(--txt2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rm-img {
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(255,68,102,.12); color: var(--red);
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem; flex-shrink: 0;
  transition: background .15s;
}
.rm-img:hover { background: rgba(255,68,102,.25); }

.inp-row { display: flex; align-items: flex-end; gap: 8px; }
.inp-wrap {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: 16px;
  padding: 10px 12px;
  display: flex; align-items: flex-end; gap: 7px;
  transition: border-color .2s;
}
.inp-wrap:focus-within { border-color: rgba(94,255,67,.28); }
.inp-ico {
  color: var(--txt3); font-size: 1.05rem;
  flex-shrink: 0; padding: 2px;
  transition: color .15s;
}
.inp-ico:hover, .inp-ico:active { color: var(--g); }
#chat-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--txt); font-size: .86rem;
  max-height: 120px; overflow-y: auto;
  resize: none; line-height: 1.5; padding: 0;
}
#chat-input::placeholder { color: var(--txt3); }
.btn-send {
  width: 44px; height: 44px; border-radius: 13px;
  background: var(--g); color: #000;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; flex-shrink: 0;
  transition: transform .15s var(--spring), opacity .15s, box-shadow .2s;
  box-shadow: 0 4px 16px var(--g-glow);
}
.btn-send:hover  { transform: scale(1.07); }
.btn-send:active { transform: scale(.9); }
.btn-send:disabled { opacity: .3; box-shadow: none; transform: none; pointer-events: none; }

/* ══════════════════════════════════════
   EMOJI PANEL
══════════════════════════════════════ */
.emoji-panel {
  max-height: 0; overflow: hidden;
  transition: max-height .25s var(--ease);
  background: var(--bg1); border-top: 1px solid transparent;
}
.emoji-panel.open { max-height: 220px; border-top-color: var(--bd); }
.e-cats {
  display: flex; gap: 2px; overflow-x: auto;
  padding: 7px 8px 5px; border-bottom: 1px solid var(--bd);
}
.e-cat {
  flex-shrink: 0; font-size: .95rem;
  padding: 5px 9px; border-radius: 8px;
  transition: background .12s;
}
.e-cat:hover, .e-cat.active { background: var(--bg3); }
.e-grid {
  display: flex; flex-wrap: wrap; gap: 2px;
  padding: 7px 8px; max-height: 150px; overflow-y: auto;
}
.e-btn {
  font-size: 1.3rem; padding: 4px; border-radius: 7px;
  cursor: pointer; transition: background .1s;
}
.e-btn:hover { background: var(--bg3); }

/* ══════════════════════════════════════
   LIGHTBOX
══════════════════════════════════════ */
#lightbox {
  position: fixed; inset: 0; z-index: 900;
  background: rgba(0,0,0,.92);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
#lightbox.open { opacity: 1; pointer-events: all; }
#lightbox img { max-width: 94vw; max-height: 90vh; border-radius: 12px; }
#lb-close {
  position: absolute; top: 14px; right: 14px;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,.12); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
}

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
.modal-ov {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.72);
  display: flex; align-items: flex-end;
  opacity: 0; visibility: hidden;
  transition: opacity .25s, visibility .25s;
}
.modal-ov.show { opacity: 1; visibility: visible; }
.modal-sheet {
  width: 100%; max-width: 520px; margin: 0 auto;
  background: var(--bg1);
  border-radius: 20px 20px 0 0;
  border: 1px solid var(--bd); border-bottom: none;
  padding: 18px 20px 32px;
  transform: translateY(100%);
  transition: transform .3s var(--spring);
  display: flex; flex-direction: column; gap: 14px;
}
.modal-ov.show .modal-sheet { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--bd); border-radius: 2px; margin: 0 auto 4px; }
.modal-ico { font-size: 2rem; text-align: center; }
.modal-title { font-size: .96rem; font-weight: 800; text-align: center; }
.modal-body { font-size: .8rem; color: var(--txt2); text-align: center; line-height: 1.6; }
.modal-btn { width: 100%; padding: 13px; border-radius: 13px; font-size: .86rem; font-weight: 800; transition: opacity .15s; }
.modal-btn:active { opacity: .8; }
.modal-btn.danger   { background: rgba(255,68,102,.1); color: var(--red); border: 1px solid rgba(255,68,102,.2); }
.modal-btn.neutral  { background: var(--bg2); color: var(--txt2); border: 1px solid var(--bd); }

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
#toasts {
  position: fixed; bottom: 76px; left: 50%;
  transform: translateX(-50%);
  z-index: 9999; display: flex;
  flex-direction: column; gap: 6px;
  align-items: center; pointer-events: none;
}
.toast {
  background: var(--bg3); color: var(--txt);
  padding: 9px 18px; border-radius: 999px;
  font-size: .77rem; font-weight: 700;
  border: 1px solid var(--bd);
  white-space: nowrap;
  animation: toastIn .24s var(--spring);
}
@keyframes toastIn { from { opacity:0; transform:translateY(6px) scale(.93) } to { opacity:1; transform:none } }
.toast.out { animation: toastOut .2s var(--ease) forwards; }
@keyframes toastOut { to { opacity:0; transform:translateY(3px) scale(.95) } }
  </style>
</head>
<body>

<input type="file" id="file-chat" accept="image/*">

<!-- ══════════════════════════════════════
     SHELL
══════════════════════════════════════ -->
<div id="app">

  <!-- ──────────── SIDEBAR ──────────── -->
  <div id="sidebar">

    <div class="sb-top">
      <div class="brand"><span class="v">V</span><span class="ela">ELA</span></div>
      <div id="sb-unread" class="sb-unread"></div>
      <button class="icon-btn" onclick="focusSearch()" title="Nueva conversación">
        <ion-icon name="create-outline"></ion-icon>
      </button>
      <a href="./biblioteca.html" class="icon-btn" title="Volver">
        <ion-icon name="grid-outline"></ion-icon>
      </a>
    </div>

    <div class="sb-search">
      <div class="search-box">
        <ion-icon name="search-outline"></ion-icon>
        <input
          type="text"
          id="search-inp"
          placeholder="Buscar conversación o usuario..."
          oninput="onSearch(this.value)"
          autocomplete="off"
        >
      </div>
    </div>

    <div id="conv-list"></div>

  </div><!-- /sidebar -->


  <!-- ──────────── CHAT AREA ──────────── -->
  <div id="chat-area">

    <!-- empty state (default) -->
    <div id="empty-state">
      <div class="es-logo"><span class="v">V</span><span class="ela">ELA</span></div>
      <p class="es-hint">Selecciona una conversación o busca a alguien nuevo para empezar</p>
    </div>

    <!-- chat panel (shown when contact is open) -->
    <div id="chat-panel" style="display:none; flex:1; flex-direction:column; height:100%;">

      <div class="ch-hdr">
        <button class="icon-btn" id="btn-back" onclick="closeChat()" style="display:none">
          <ion-icon name="arrow-back-outline"></ion-icon>
        </button>
        <div id="ch-av" class="ch-av">?</div>
        <div class="ch-info">
          <div class="ch-name" id="ch-name">@usuario</div>
          <div class="ch-status">
            <div class="status-dot" id="status-dot"></div>
            <span id="ch-sub">Cargando...</span>
          </div>
        </div>
        <div class="ch-actions">
          <button class="icon-btn" onclick="goProfile()" title="Ver perfil">
            <ion-icon name="person-circle-outline"></ion-icon>
          </button>
          <button class="icon-btn" style="color:var(--red)" onclick="delChat()" title="Eliminar chat">
            <ion-icon name="trash-outline"></ion-icon>
          </button>
        </div>
      </div>

      <div id="messages"></div>

      <div class="emoji-panel" id="emoji-panel">
        <div class="e-cats" id="e-cats"></div>
        <div class="e-grid" id="e-grid"></div>
      </div>

      <div class="input-bar">
        <div class="img-preview" id="img-preview">
          <img id="prev-thumb" src="" alt="">
          <span class="img-preview-name" id="prev-name"></span>
          <button class="rm-img" onclick="removeImg()"><ion-icon name="close-outline"></ion-icon></button>
        </div>
        <div class="inp-row">
          <div class="inp-wrap">
            <button class="inp-ico" onclick="toggleEmoji()"><ion-icon name="happy-outline"></ion-icon></button>
            <textarea
              id="chat-input"
              rows="1"
              placeholder="Escribe un mensaje..."
              oninput="autoH(this)"
              onkeydown="onKey(event)"
            ></textarea>
            <button class="inp-ico" onclick="document.getElementById('file-chat').click()">
              <ion-icon name="image-outline"></ion-icon>
            </button>
          </div>
          <button class="btn-send" id="btn-send" onclick="sendMsg()">
            <ion-icon name="send"></ion-icon>
          </button>
        </div>
      </div>

    </div><!-- /chat-panel -->

  </div><!-- /chat-area -->

</div><!-- /app -->

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLB()">
  <button id="lb-close" onclick="closeLB()"><ion-icon name="close-outline"></ion-icon></button>
  <img id="lb-img" src="" alt="">
</div>

<!-- MODAL -->
<div class="modal-ov" id="modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-ico" id="modal-ico">⚠️</div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body"  id="modal-body"></div>
    <button class="modal-btn danger"  id="modal-ok">Confirmar</button>
    <button class="modal-btn neutral" onclick="closeModal()">Cancelar</button>
  </div>
</div>

<div id="toasts"></div>

<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

<script>
/* ══════════════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════════════ */
const API   = 'https://upgames-production.up.railway.app';
const ME    = localStorage.getItem('user_admin') || '';
const TOKEN = localStorage.getItem('token') || '';

// Auth guard — soft: redirect only if truly missing
if (!ME || !TOKEN) {
  localStorage.clear(); // clean any stale data
  location.replace('../index.html');
}

/* ══════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════ */
let contact    = null;
let contacts   = [];
let polling    = null;
let lastTs     = 0;
let pendingImg = null;
let emojiOpen  = false;
let searchTmr  = null;
let authRetry  = 0;

const MAX_AUTH_RETRIES = 3;

/* ══════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════ */
const aH  = () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` });
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const aL  = u => (u || '?')[0].toUpperCase();
const mob = () => window.innerWidth < 721;

function fmtT(iso) {
  const d = new Date(iso), n = new Date(), diff = n - d;
  if (diff < 60000)   return 'ahora';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm';
  if (diff < 86400000 && n.getDate() === d.getDate())
    return d.toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
  if (diff < 172800000) return 'ayer';
  if (diff < 604800000) return ['dom','lun','mar','mié','jue','vie','sáb'][d.getDay()];
  return d.toLocaleDateString('es-ES', { day:'2-digit', month:'2-digit' });
}
function fmtH(iso) {
  return new Date(iso).toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });
}
function fmtDS(iso) {
  const d = new Date(iso), n = new Date(), diff = n - d;
  if (diff < 86400000 && n.getDate() === d.getDate()) return 'hoy';
  if (diff < 172800000) return 'ayer';
  return d.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long' });
}

function toast(msg, dur = 2800) {
  const b = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  b.appendChild(t);
  setTimeout(() => {
    t.classList.add('out');
    setTimeout(() => t.remove(), 220);
  }, dur);
}

/* ══════════════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════════════ */
function showModal(ico, title, body, cb) {
  document.getElementById('modal-ico').textContent = ico;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-ok').onclick = () => { closeModal(); cb && cb(); };
  document.getElementById('modal').classList.add('show');
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
}
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

/* ══════════════════════════════════════════════════════
   SIDEBAR — CONVERSATION LIST
══════════════════════════════════════════════════════ */
async function loadList() {
  try {
    const r = await fetch(`${API}/chat/conversaciones`, { headers: aH() });
    if (!r.ok) {
      if (r.status === 401) {
        authRetry++;
        if (authRetry >= MAX_AUTH_RETRIES) {
          toast('⚠️ Sesión expirada — redirigiendo...');
          setTimeout(() => location.replace('../index.html'), 1600);
        }
      }
      return;
    }
    authRetry = 0; // reset on success
    const d = await r.json();
    if (!d.success) return;
    contacts = d.conversaciones || [];

    const q = document.getElementById('search-inp').value.trim();
    if (!q) renderList();
    updBadge();
  } catch (_) {}
}

function updBadge() {
  const total = contacts.reduce((s, c) => s + (c.noLeidos || 0), 0);
  const el = document.getElementById('sb-unread');
  if (total > 0) {
    el.textContent = total > 99 ? '99+' : total;
    el.style.display = 'flex';
  } else {
    el.style.display = 'none';
  }
}

function renderList(filter = '') {
  const list = document.getElementById('conv-list');

  // Remove any dynamic search sections
  list.querySelectorAll('.sec-label, .usr-result').forEach(el => el.remove());

  const f = filter
    ? contacts.filter(c => c.contacto.toLowerCase().includes(filter.toLowerCase()))
    : contacts;

  // Clear existing conv items
  list.querySelectorAll('.conv-item').forEach(el => el.remove());
  const empty = list.querySelector('.conv-empty');
  if (empty) empty.remove();

  if (!f.length) {
    const el = document.createElement('div');
    el.className = 'conv-empty';
    el.innerHTML = `
      <div class="ico">💬</div>
      <p>${filter
        ? 'Sin resultados en tus chats.<br>Busca nuevos usuarios abajo.'
        : 'Aún no tienes conversaciones.<br>Usa ✏️ para encontrar a alguien.'}</p>`;
    list.appendChild(el);
    return;
  }

  f.forEach(c => {
    const unread = (c.noLeidos || 0) > 0;
    const isImg  = c.ultimoMensaje?.imagen && !c.ultimoMensaje?.texto;
    const mine   = c.ultimoMensaje?.de === ME;
    const prev   = isImg
      ? '📷 Imagen'
      : mine
        ? `Tú: ${c.ultimoMensaje?.texto || ''}`
        : c.ultimoMensaje?.texto || '';

    const div = document.createElement('div');
    div.className = 'conv-item' + (contact === c.contacto ? ' active' : '');
    div.dataset.user = c.contacto;
    div.onclick = () => openChat(c.contacto);
    div.innerHTML = `
      <div class="c-av">${aL(c.contacto)}</div>
      <div class="c-body">
        <div class="c-name">@${esc(c.contacto)}</div>
        <div class="c-preview">${esc(prev)}</div>
      </div>
      <div class="c-meta">
        <div class="c-time">${c.ultimoMensaje ? fmtT(c.ultimoMensaje.fecha) : ''}</div>
        ${unread ? `<div class="c-badge">${c.noLeidos > 9 ? '9+' : c.noLeidos}</div>` : ''}
      </div>`;
    list.appendChild(div);
  });
}

/* ══════════════════════════════════════════════════════
   SEARCH — conversations + platform user search
══════════════════════════════════════════════════════ */
function onSearch(q) {
  clearTimeout(searchTmr);
  const query = q.trim();

  // Filter existing conversations immediately
  renderList(query);

  if (!query) return;

  // Debounce: search platform users via API
  searchTmr = setTimeout(() => searchPlatformUsers(query), 380);
}

async function searchPlatformUsers(q) {
  try {
    const r = await fetch(
      `${API}/usuarios/buscar?q=${encodeURIComponent(q)}`,
      { headers: aH() }
    );
    if (!r.ok) return;
    const d = await r.json();
    if (!d.success || !d.usuarios?.length) return;

    const list = document.getElementById('conv-list');

    // Remove any previous user search results
    list.querySelectorAll('.sec-label, .usr-result').forEach(el => el.remove());

    // Only show users not already in conversations
    const existing = contacts.map(c => c.contacto);
    const newUsers = d.usuarios.filter(u => !existing.includes(u.usuario));
    if (!newUsers.length) return;

    const label = document.createElement('div');
    label.className = 'sec-label';
    label.textContent = 'Usuarios en Vela';
    list.appendChild(label);

    newUsers.forEach(u => {
      const div = document.createElement('div');
      div.className = 'usr-result';
      div.innerHTML = `
        <div class="ur-av">
          ${aL(u.usuario)}
          ${u.foto ? `<img src="${esc(u.foto)}" alt="" loading="lazy">` : ''}
        </div>
        <div>
          <div class="ur-name">@${esc(u.usuario)}</div>
          <div class="ur-sub">${u.seguidores || 0} seguidores</div>
        </div>
        <button class="ur-btn" onclick="openChat('${esc(u.usuario)}')">Mensaje</button>`;
      list.appendChild(div);
    });
  } catch (_) {}
}

function focusSearch() {
  const inp = document.getElementById('search-inp');
  inp.value = '';
  onSearch('');
  inp.focus();
}

/* ══════════════════════════════════════════════════════
   CHAT — OPEN / CLOSE
══════════════════════════════════════════════════════ */
function openChat(c) {
  contact = c;
  lastTs  = 0;

  // Update header
  const av = document.getElementById('ch-av');
  av.innerHTML = aL(c);
  av.style.background = 'linear-gradient(135deg,var(--g),var(--cy))';
  document.getElementById('ch-name').textContent = '@' + c;
  document.getElementById('ch-sub').textContent = 'Cargando...';
  document.getElementById('status-dot').className = 'status-dot';

  // Show chat panel, hide empty
  document.getElementById('empty-state').style.display = 'none';
  const panel = document.getElementById('chat-panel');
  panel.style.display = 'flex';

  document.getElementById('messages').innerHTML = '';
  closeEmoji();
  removeImg();

  // Highlight in sidebar
  document.querySelectorAll('.conv-item').forEach(el => {
    el.classList.toggle('active', el.dataset.user === c);
  });

  // Mobile: slide chat area in
  if (mob()) {
    document.getElementById('sidebar').classList.add('off');
    document.getElementById('chat-area').classList.add('open');
    document.getElementById('btn-back').style.display = 'flex';
  }

  // Load messages & start polling
  loadMsgs().then(() => {
    startPoll();
    loadContactStatus(c);
  });
}

function closeChat() {
  stopPoll();
  contact = null;

  if (mob()) {
    document.getElementById('sidebar').classList.remove('off');
    document.getElementById('chat-area').classList.remove('open');
    document.getElementById('btn-back').style.display = 'none';
  }

  document.getElementById('empty-state').style.display = 'flex';
  document.getElementById('chat-panel').style.display = 'none';
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));

  loadList();
}

async function loadContactStatus(username) {
  try {
    const r = await fetch(
      `${API}/usuarios/perfil-publico/${encodeURIComponent(username)}`
    );
    if (!r.ok) return;
    const d = await r.json();
    if (!d.success || !d.usuario) return;

    const ult  = d.usuario.ultimoLogin ? new Date(d.usuario.ultimoLogin) : null;
    const diff = ult ? Date.now() - ult.getTime() : null;
    const dot  = document.getElementById('status-dot');
    const sub  = document.getElementById('ch-sub');

    if (diff !== null && diff < 300000) { // < 5 min → online
      dot.className = 'status-dot online';
      sub.textContent = 'En línea';
    } else if (ult) {
      dot.className = 'status-dot';
      sub.textContent = `Visto ${fmtT(ult.toISOString())}`;
    } else {
      dot.className = 'status-dot';
      sub.textContent = 'Desconectado';
    }
  } catch (_) {}
}

/* ══════════════════════════════════════════════════════
   MESSAGES — LOAD
══════════════════════════════════════════════════════ */
async function loadMsgs() {
  if (!contact) return;
  try {
    const url = lastTs
      ? `${API}/chat/mensajes/${contact}?desde=${lastTs}`
      : `${API}/chat/mensajes/${contact}`;

    const r = await fetch(url, { headers: aH() });
    if (!r.ok) return;
    const d = await r.json();
    if (!d.success) return;

    const msgs = d.mensajes || [];
    const msgEl = document.getElementById('messages');

    if (!msgs.length && !lastTs) {
      msgEl.innerHTML = `
        <div style="padding:40px 24px;text-align:center;color:var(--txt3);">
          <div style="font-size:2.4rem;margin-bottom:12px">👋</div>
          <p style="font-size:.82rem;line-height:1.8">
            Empieza la conversación<br>
            <span style="font-size:.72rem;color:var(--txt3)">
              @${esc(contact)} recibirá tu mensaje
            </span>
          </p>
        </div>`;
      return;
    }

    if (lastTs) {
      appendMsgs(msgs);
    } else {
      renderMsgs(msgs);
    }

    if (msgs.length) {
      lastTs = Math.max(...msgs.map(m => new Date(m.fecha).getTime()));
    }
  } catch (_) {}
}

/* ══════════════════════════════════════════════════════
   MESSAGES — RENDER
══════════════════════════════════════════════════════ */
function renderMsgs(msgs) {
  const c = document.getElementById('messages');
  c.innerHTML = '';

  let lastDate   = '';
  let lastSender = '';
  let lastTime   = 0;

  msgs.forEach(m => {
    const ds = fmtDS(m.fecha);
    if (ds !== lastDate) {
      lastDate = ds;
      lastSender = '';
      lastTime = 0;
      c.appendChild(mkDateSep(ds));
    }

    const ts = new Date(m.fecha).getTime();
    const isCont = (m.de === lastSender) && ((ts - lastTime) < 180000);
    lastSender = m.de;
    lastTime   = ts;

    c.appendChild(mkGroup(m, isCont));
  });

  c.scrollTop = c.scrollHeight;
}

function appendMsgs(msgs) {
  if (!msgs.length) return;
  const c = document.getElementById('messages');

  // Remove placeholder
  const ph = c.querySelector('[data-placeholder]');
  if (ph) ph.remove();

  // Find last group metadata
  const lastGroup = c.querySelector('.msg-group:last-of-type');
  let lastSender  = lastGroup?.dataset.sender || '';
  let lastTime    = parseInt(lastGroup?.dataset.ts || '0', 10);

  msgs.forEach(m => {
    const ts     = new Date(m.fecha).getTime();
    const isCont = (m.de === lastSender) && ((ts - lastTime) < 180000);
    lastSender = m.de;
    lastTime   = ts;
    c.appendChild(mkGroup(m, isCont));
  });

  c.scrollTop = c.scrollHeight;

  // Desktop notification for received messages
  const recv = msgs.filter(m => m.de !== ME);
  if (recv.length && document.hidden && Notification.permission === 'granted') {
    const last = recv[recv.length - 1];
    new Notification(`💬 @${last.de}`, {
      body: last.imagen ? '📷 Imagen' : last.texto?.slice(0, 80),
      tag: 'chat-' + last.de,
      renotify: true
    });
  }
}

function mkDateSep(label) {
  const d = document.createElement('div');
  d.className = 'msg-date';
  d.textContent = label;
  return d;
}

function mkGroup(m, isCont) {
  const mine = m.de === ME;
  const ts   = new Date(m.fecha).getTime();

  const wrap = document.createElement('div');
  wrap.className = `msg-group ${isCont ? 'cont' : ''}`;
  wrap.dataset.sender = m.de;
  wrap.dataset.ts     = ts;

  // Avatar
  const av = document.createElement('div');
  av.className = 'grp-av';
  av.textContent = aL(m.de);

  // Body
  const body = document.createElement('div');
  body.className = 'grp-body';

  // Meta (name + time)
  if (!isCont) {
    const meta = document.createElement('div');
    meta.className = 'grp-meta';
    meta.innerHTML = `
      <span class="meta-name${mine ? ' mine' : ''}">@${esc(m.de)}</span>
      <span class="meta-ts">${fmtH(m.fecha)}</span>`;
    body.appendChild(meta);
  }

  // Image
  if (m.imagen) {
    const imgWrap = document.createElement('div');
    imgWrap.className = `msg-img${mine ? ' mine' : ''}`;
    imgWrap.onclick = () => openLB(m.imagen);
    const img = document.createElement('img');
    img.src = m.imagen;
    img.alt = 'imagen';
    img.loading = 'lazy';
    imgWrap.appendChild(img);
    body.appendChild(imgWrap);
  }

  // Text
  if (m.texto) {
    const line = document.createElement('div');
    line.className = `msg-line${mine ? ' mine' : ''}`;
    line.innerHTML = esc(m.texto).replace(/\n/g, '<br>');
    body.appendChild(line);
  }

  // Read receipt (only on mine, last in group)
  if (mine) {
    const rd = document.createElement('div');
    rd.className = `msg-read${m.leido ? ' seen' : ''}`;
    rd.innerHTML = `
      <ion-icon name="${m.leido ? 'checkmark-done' : 'checkmark'}-outline"></ion-icon>
      ${m.leido ? 'Leído' : 'Enviado'}`;
    body.appendChild(rd);
  }

  // Time tip on hover
  const tip = document.createElement('div');
  tip.className = 'ts-tip';
  tip.textContent = fmtH(m.fecha);

  wrap.appendChild(av);
  wrap.appendChild(body);
  wrap.appendChild(tip);
  return wrap;
}

function startPoll() {
  stopPoll();
  polling = setInterval(loadMsgs, 3000);
}
function stopPoll() {
  if (polling) { clearInterval(polling); polling = null; }
}

/* ══════════════════════════════════════════════════════
   SEND MESSAGE
══════════════════════════════════════════════════════ */
async function sendMsg() {
  if (!contact) return;
  const inp  = document.getElementById('chat-input');
  const text = inp.value.trim();
  if (!text && !pendingImg) return;

  const btn = document.getElementById('btn-send');
  btn.disabled = true;
  inp.value = '';
  inp.style.height = 'auto';

  let imgUrl = '';
  if (pendingImg) {
    try {
      const r = await fetch(`${API}/chat/imagen`, {
        method: 'POST',
        headers: aH(),
        body: JSON.stringify({ imagen: pendingImg })
      });
      const d = await r.json();
      if (d.success) imgUrl = d.url;
      else toast('❌ Error al subir imagen');
    } catch (_) {
      toast('❌ Sin conexión');
      btn.disabled = false;
      return;
    }
    removeImg();
  }

  // Optimistic render
  const tid = 'tmp-' + Date.now();
  const tmp = {
    id: tid, de: ME,
    texto: text, imagen: imgUrl,
    leido: false,
    fecha: new Date().toISOString()
  };
  appendMsgs([tmp]);

  const prevTs = lastTs;
  lastTs = Date.now();

  try {
    const r = await fetch(`${API}/chat/enviar`, {
      method: 'POST',
      headers: aH(),
      body: JSON.stringify({ para: contact, texto: text, imagen: imgUrl })
    });
    const d = await r.json();
    if (!d.success) {
      // Rollback optimistic
      document.querySelector(`.msg-group[data-sender="${ME}"]:last-child`)?.remove();
      lastTs = prevTs;
      inp.value = text;
      toast('❌ ' + (d.error || 'Error'));
    } else {
      lastTs = new Date(d.mensaje.fecha).getTime();
    }
  } catch (_) {
    document.querySelector(`.msg-group[data-sender="${ME}"]:last-child`)?.remove();
    lastTs = prevTs;
    inp.value = text;
    toast('❌ Sin conexión');
  } finally {
    btn.disabled = false;
  }
}

function autoH(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
}

/* ══════════════════════════════════════════════════════
   IMAGE ATTACHMENT
══════════════════════════════════════════════════════ */
document.getElementById('file-chat').addEventListener('change', function () {
  const f = this.files[0];
  if (!f) return;
  if (f.size > 5 * 1024 * 1024) { toast('❌ Máximo 5MB por imagen'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    pendingImg = e.target.result;
    document.getElementById('prev-thumb').src = pendingImg;
    document.getElementById('prev-name').textContent = f.name;
    document.getElementById('img-preview').classList.add('show');
    document.getElementById('chat-input').focus();
  };
  reader.readAsDataURL(f);
  this.value = '';
});

function removeImg() {
  pendingImg = null;
  document.getElementById('img-preview').classList.remove('show');
  document.getElementById('prev-thumb').src = '';
}

/* ══════════════════════════════════════════════════════
   LIGHTBOX
══════════════════════════════════════════════════════ */
function openLB(url) {
  document.getElementById('lb-img').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function closeLB() {
  document.getElementById('lightbox').classList.remove('open');
}

/* ══════════════════════════════════════════════════════
   EMOJI
══════════════════════════════════════════════════════ */
const EMOJIS = {
  '😀': ['😀','😃','😄','😁','😆','🤣','😂','😊','😇','🥰','😍','🤩','😘','🤗','😏','😒','🙄','😬','😌','😔','😪','😴','😷','🤒','🤕','🤧','🥵','🥶','😵','🥳','😎','😟','😕','😣','😖','😫','😩','🥺','😢','😭','😤','😠','😡','🤬','😈'],
  '👍': ['👍','👎','👌','✌️','🤞','🤟','🤘','🤙','👈','👉','👆','👇','☝️','👋','🤚','🖐️','✋','👏','🙏','💪','❤️','🧡','💛','💚','💙','💜','🖤','💔','💕','💞','💓','💗','💖','💘','💝'],
  '🔥': ['🔥','✨','⭐','🌟','💫','⚡','🎉','🎊','🎁','🏆','🥇','💯','‼️','💥','🌈','🚀','👾','🎮','🕹️','🎯','🎲','🏅','🎖️','🎪'],
  '🐶': ['🐶','🐱','🐼','🦊','🐯','🦁','🐸','🐺','🦄','🐉','🦋','🐝','🌸','🌺','🍀','🌙','⭐','🌊','🔮','🎭'],
  '🍕': ['🍕','🍔','🌮','🍜','🍣','🧁','🎂','☕','🍵','🍺','🥂','🍷','🥃','🍸','🎶','🎵','💻','📱','🖥️','⌨️']
};

function buildEmoji() {
  const cats = document.getElementById('e-cats');
  const keys = Object.keys(EMOJIS);
  keys.forEach((cat, i) => {
    const b = document.createElement('button');
    b.className = 'e-cat' + (i === 0 ? ' active' : '');
    b.textContent = cat;
    b.onclick = () => {
      document.querySelectorAll('.e-cat').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      fillGrid(EMOJIS[cat]);
    };
    cats.appendChild(b);
  });
  fillGrid(EMOJIS[keys[0]]);
}

function fillGrid(emojis) {
  const g = document.getElementById('e-grid');
  g.innerHTML = '';
  emojis.forEach(em => {
    const b = document.createElement('button');
    b.className = 'e-btn';
    b.textContent = em;
    b.onclick = () => insertEmoji(em);
    g.appendChild(b);
  });
}

function insertEmoji(em) {
  const inp = document.getElementById('chat-input');
  const s = inp.selectionStart, e = inp.selectionEnd;
  inp.value = inp.value.slice(0, s) + em + inp.value.slice(e);
  inp.selectionStart = inp.selectionEnd = s + em.length;
  autoH(inp);
  inp.focus();
}

function toggleEmoji() {
  emojiOpen = !emojiOpen;
  document.getElementById('emoji-panel').classList.toggle('open', emojiOpen);
}
function closeEmoji() {
  emojiOpen = false;
  document.getElementById('emoji-panel').classList.remove('open');
}
document.getElementById('messages').addEventListener('click', () => {
  if (emojiOpen) closeEmoji();
});

/* ══════════════════════════════════════════════════════
   ACTIONS
══════════════════════════════════════════════════════ */
function goProfile() {
  if (contact)
    location.href = `./perfil-publico.html?usuario=${encodeURIComponent(contact)}`;
}

function delChat() {
  showModal(
    '🗑️',
    'Eliminar conversación',
    `¿Borrar todos los mensajes con <strong style="color:var(--g)">@${esc(contact)}</strong>? Esta acción no se puede deshacer.`,
    async () => {
      try {
        await fetch(`${API}/chat/conversacion/${contact}`, {
          method: 'DELETE',
          headers: aH()
        });
        toast('🗑️ Conversación eliminada');
        document.getElementById('messages').innerHTML = `
          <div data-placeholder style="padding:40px 24px;text-align:center;color:var(--txt3);">
            <div style="font-size:2.4rem;margin-bottom:12px">👋</div>
            <p style="font-size:.82rem;line-height:1.8">Conversación vacía.<br>Empieza de nuevo.</p>
          </div>`;
        lastTs = 0;
      } catch (_) {
        toast('❌ Error al eliminar');
      }
    }
  );
}

/* ══════════════════════════════════════════════════════
   RESPONSIVE — window resize
══════════════════════════════════════════════════════ */
window.addEventListener('resize', () => {
  if (!mob()) {
    // Desktop: always show sidebar, remove mobile classes
    document.getElementById('sidebar').classList.remove('off');
    document.getElementById('chat-area').classList.remove('open');
    document.getElementById('btn-back').style.display = 'none';
  } else if (contact) {
    // Mobile with open chat
    document.getElementById('sidebar').classList.add('off');
    document.getElementById('chat-area').classList.add('open');
    document.getElementById('btn-back').style.display = 'flex';
  }
});

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
async function init() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  buildEmoji();
  await loadList();

  // Refresh list every 8s
  setInterval(loadList, 8000);

  // Open chat from URL param
  const param = new URLSearchParams(location.search).get('usuario');
  if (param?.trim()) {
    setTimeout(() => openChat(param.trim()), 150);
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
