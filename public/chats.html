<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#07070f">
  <title>Chats тАФ UpGames</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
:root {
  --g:      #5EFF43;
  --g-dim:  rgba(94,255,67,.12);
  --g-glow: rgba(94,255,67,.25);
  --cy:     #00d4ff;
  --bg:     #07070f;
  --bg1:    #0d0d1a;
  --bg2:    #12121f;
  --bg3:    #191927;
  --bd:     rgba(255,255,255,.07);
  --bd-g:   rgba(94,255,67,.25);
  --txt:    #f0f0f8;
  --txt2:   #9090aa;
  --txt3:   #555570;
  --ease:   cubic-bezier(.4,0,.2,1);
  --spring: cubic-bezier(.34,1.4,.64,1);
  --ff:     'Manrope',-apple-system,sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);font-family:var(--ff);color:var(--txt);-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
button{cursor:pointer;background:none;border:none;color:inherit;font-family:inherit;}
a{text-decoration:none;color:inherit;}
::-webkit-scrollbar{display:none;}
textarea,input{font-family:inherit;}

/* VIEWS */
#view-list,#view-chat{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);transition:transform .3s var(--ease),opacity .25s;will-change:transform;}
#view-list{z-index:10;}
#view-chat{z-index:20;transform:translateX(100%);opacity:0;pointer-events:none;}
#view-chat.open{transform:translateX(0);opacity:1;pointer-events:all;}

/* HEADER */
.hdr{height:56px;background:rgba(7,7,15,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0;z-index:5;}
.hdr-logo{font-size:1.25rem;font-weight:900;letter-spacing:1.5px;}
.hdr-logo .up{color:var(--g);}.hdr-logo .gm{color:var(--txt);}
.hdr-title{font-size:.95rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-sub{font-size:.62rem;color:var(--txt3);margin-top:1px;}
.hdr-contact{display:flex;flex-direction:column;gap:1px;flex:1;min-width:0;}
.hdr-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--txt2);font-size:1.15rem;transition:background .15s,color .15s;flex-shrink:0;}
.hdr-btn:active{background:var(--bg2);color:var(--g);}

/* STORIES BAR */
.stories-bar{flex-shrink:0;padding:12px 0 10px;border-bottom:1px solid var(--bd);background:var(--bg1);}
.stories-scroll{display:flex;gap:12px;overflow-x:auto;padding:0 14px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
.story-item{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;scroll-snap-align:start;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.story-ring{width:60px;height:60px;border-radius:50%;padding:2.5px;background:linear-gradient(135deg,var(--g),var(--cy));flex-shrink:0;transition:transform .18s var(--spring);}
.story-ring.seen{background:linear-gradient(135deg,#2a2a2a,#444);}
.story-ring.mine{background:linear-gradient(135deg,var(--g),#00ff88);}
.story-item:active .story-ring{transform:scale(.88);}
.story-inner{width:100%;height:100%;border-radius:50%;background:var(--bg2);border:2.5px solid var(--bg1);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:900;color:#000;position:relative;}
.story-inner img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.story-add{position:absolute;bottom:-1px;right:-1px;width:18px;height:18px;border-radius:50%;background:var(--g);color:#000;font-size:.75rem;font-weight:900;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg1);}
.story-name{font-size:.62rem;font-weight:700;color:var(--txt2);max-width:60px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.story-name.mine{color:var(--g);}

/* SEARCH */
.search-wrap{padding:10px 12px 6px;display:flex;gap:8px;align-items:center;flex-shrink:0;}
.search-inner{flex:1;display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:9px 12px;transition:border-color .2s;}
.search-inner:focus-within{border-color:rgba(94,255,67,.35);}
.search-inner ion-icon{color:var(--txt3);font-size:1rem;flex-shrink:0;}
.search-inner input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-size:.83rem;}
.search-inner input::placeholder{color:var(--txt3);}
.btn-danger-sm{flex-shrink:0;width:38px;height:38px;border-radius:10px;border:1px solid rgba(255,67,67,.2);background:rgba(255,67,67,.07);color:#ff6b6b;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.btn-danger-sm:active{background:rgba(255,67,67,.15);}

/* DISCOVER */
.discover-section{flex-shrink:0;padding:10px 0 6px;border-bottom:1px solid var(--bd);}
.discover-header{display:flex;align-items:center;justify-content:space-between;padding:0 14px 8px;}
.discover-label{display:flex;align-items:center;gap:7px;font-size:.7rem;font-weight:800;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;}
.discover-badge{font-size:.6rem;font-weight:700;padding:2px 8px;background:rgba(94,255,67,.1);border:1px solid rgba(94,255,67,.2);color:var(--g);border-radius:999px;}
.discover-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 14px 6px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
.d-card{flex-shrink:0;width:104px;background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:12px 10px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;scroll-snap-align:start;cursor:pointer;transition:border-color .2s,transform .15s var(--spring);-webkit-tap-highlight-color:transparent;}
.d-card:active{transform:scale(.94);border-color:var(--bd-g);}
.d-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--g),var(--cy));display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:900;color:#000;position:relative;overflow:hidden;flex-shrink:0;}
.d-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.d-name{font-size:.68rem;font-weight:700;color:var(--txt);text-align:center;width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.d-subs{font-size:.58rem;color:var(--txt3);}.d-subs span{color:var(--g);font-weight:700;}
.d-btn{width:100%;padding:5px 0;border-radius:8px;background:var(--g-dim);border:1px solid rgba(94,255,67,.15);color:var(--g);font-size:.63rem;font-weight:800;display:flex;align-items:center;justify-content:center;gap:4px;}
.d-btn:active{background:rgba(94,255,67,.22);}
.d-skel{flex-shrink:0;width:104px;height:140px;background:var(--bg2);border:1px solid var(--bd);border-radius:14px;overflow:hidden;position:relative;}
.d-skel::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.03),transparent);animation:shimmer 1.4s infinite;}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* CONV LIST */
#conv-list{flex:1;overflow-y:auto;min-height:0;}
.conv-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--bd);transition:background .15s;-webkit-tap-highlight-color:transparent;}
.conv-item:active{background:var(--bg2);}
.conv-item.unread{background:rgba(94,255,67,.025);}
.c-av{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--g),var(--cy));display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:900;color:#000;flex-shrink:0;position:relative;overflow:hidden;}
.c-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.c-online{position:absolute;bottom:2px;right:2px;width:12px;height:12px;border-radius:50%;background:var(--g);border:2.5px solid var(--bg);}
.c-body{flex:1;min-width:0;}
.c-row1{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:3px;}
.c-name{font-size:.88rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.c-time{font-size:.62rem;color:var(--txt3);flex-shrink:0;}
.c-row2{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.c-last{font-size:.75rem;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.c-last.mine::before{content:'T├║: ';}
.c-badge{background:var(--g);color:#000;font-size:.6rem;font-weight:900;min-width:18px;height:18px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 5px;flex-shrink:0;animation:badgePop .2s var(--spring);}
@keyframes badgePop{from{transform:scale(0)}to{transform:scale(1)}}
.conv-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;gap:14px;text-align:center;}
.conv-empty ion-icon{font-size:3.5rem;color:var(--txt3);opacity:.3;}
.conv-empty h3{font-size:1rem;font-weight:700;color:var(--txt2);}
.conv-empty p{font-size:.8rem;color:var(--txt3);line-height:1.6;max-width:280px;}

/* CHAT */
#chat-messages{flex:1;overflow-y:auto;padding:12px 14px 8px;display:flex;flex-direction:column;gap:3px;background:radial-gradient(ellipse 80% 50% at 90% 5%,rgba(94,255,67,.04),transparent 55%),radial-gradient(ellipse 60% 50% at 5% 95%,rgba(0,212,255,.03),transparent 55%),var(--bg);}
.msg-date-sep{align-self:center;font-size:.61rem;color:var(--txt3);background:var(--bg2);border:1px solid var(--bd);padding:3px 12px;border-radius:999px;margin:8px 0 4px;letter-spacing:.3px;}
.msg-wrap{display:flex;flex-direction:column;max-width:78%;animation:bubIn .18s var(--ease);}
@keyframes bubIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.msg-wrap.sent{align-self:flex-end;align-items:flex-end;}
.msg-wrap.recv{align-self:flex-start;align-items:flex-start;}
.msg-bub{padding:9px 13px;border-radius:18px;font-size:.86rem;line-height:1.48;word-break:break-word;position:relative;}
.msg-wrap.sent .msg-bub{background:#1c3a1c;border:1px solid rgba(94,255,67,.18);color:#dfffd0;border-bottom-right-radius:4px;}
.msg-wrap.recv .msg-bub{background:var(--bg2);border:1px solid var(--bd);color:var(--txt);border-bottom-left-radius:4px;}
.msg-wrap.sent .msg-bub::after{content:'';position:absolute;bottom:0;right:-6px;border:7px solid transparent;border-left-color:#1c3a1c;border-bottom-color:#1c3a1c;border-right:none;border-top:none;}
.msg-wrap.recv .msg-bub::after{content:'';position:absolute;bottom:0;left:-6px;border:7px solid transparent;border-right-color:var(--bg2);border-bottom-color:var(--bg2);border-left:none;border-top:none;}
.msg-img{max-width:220px;border-radius:14px;overflow:hidden;cursor:pointer;border:1px solid var(--bd);margin-bottom:2px;}
.msg-img img{width:100%;height:auto;display:block;max-height:280px;object-fit:cover;}
.msg-wrap.sent .msg-img{border-color:rgba(94,255,67,.2);}
.msg-wrap.sent+.msg-wrap.sent .msg-bub{border-bottom-right-radius:4px;}
.msg-wrap.recv+.msg-wrap.recv .msg-bub{border-bottom-left-radius:4px;}
.msg-wrap.sent+.msg-wrap.sent .msg-bub::after,.msg-wrap.recv+.msg-wrap.recv .msg-bub::after{display:none;}
.msg-wrap.sent+.msg-wrap.recv,.msg-wrap.recv+.msg-wrap.sent{margin-top:8px;}
.msg-time{font-size:.6rem;color:var(--txt3);margin-top:3px;padding:0 2px;display:flex;align-items:center;gap:4px;}
.msg-check{font-size:.72rem;}

/* INPUT BAR */
.input-bar{padding:8px 10px;padding-bottom:max(8px,env(safe-area-inset-bottom,0px));background:rgba(7,7,15,.97);border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
.img-preview{display:none;align-items:center;gap:8px;padding:6px 8px;background:var(--bg2);border:1px solid var(--bd);border-radius:12px;animation:bubIn .2s;}
.img-preview.show{display:flex;}
.img-preview img{width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.img-preview-name{flex:1;font-size:.75rem;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.img-preview-rm{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:rgba(255,67,67,.15);color:#ff6b6b;display:flex;align-items:center;justify-content:center;font-size:.75rem;}
.img-preview-rm:active{background:rgba(255,67,67,.3);}
.input-row{display:flex;align-items:flex-end;gap:8px;}
.input-wrap{flex:1;background:var(--bg2);border:1px solid var(--bd);border-radius:22px;padding:9px 12px;display:flex;align-items:flex-end;gap:6px;transition:border-color .2s;}
.input-wrap:focus-within{border-color:rgba(94,255,67,.35);}
.inp-btn{flex-shrink:0;color:var(--txt3);font-size:1.15rem;width:28px;height:28px;display:flex;align-items:center;justify-content:center;transition:color .15s;}
.inp-btn:active{color:var(--g);}
#chat-input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-size:.87rem;max-height:120px;overflow-y:auto;padding:0;line-height:1.45;resize:none;}
#chat-input::placeholder{color:var(--txt3);}
.btn-send{width:44px;height:44px;border-radius:50%;background:var(--g);color:#000;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;transition:transform .15s var(--spring),opacity .15s,box-shadow .2s;box-shadow:0 4px 18px var(--g-glow);}
.btn-send:active{transform:scale(.88);opacity:.85;}
.btn-send:disabled{opacity:.3;box-shadow:none;cursor:default;transform:none;}

/* EMOJI PANEL */
.emoji-panel{max-height:0;overflow:hidden;transition:max-height .25s var(--ease);background:var(--bg1);border-top:1px solid transparent;}
.emoji-panel.open{max-height:220px;border-top-color:var(--bd);}
.emoji-cats{display:flex;gap:0;overflow-x:auto;padding:8px 10px 6px;border-bottom:1px solid var(--bd);}
.emoji-cat-btn{flex-shrink:0;font-size:1.05rem;padding:4px 9px;border-radius:8px;transition:background .15s;}
.emoji-cat-btn.active{background:var(--g-dim);}
.emoji-cat-btn:active{background:var(--bg3);}
.emoji-grid{display:flex;flex-wrap:wrap;gap:2px;padding:8px 10px;max-height:160px;overflow-y:auto;}
.emoji-btn{font-size:1.4rem;padding:4px 5px;border-radius:8px;cursor:pointer;transition:background .12s,transform .1s;line-height:1;}
.emoji-btn:active{background:var(--bg3);transform:scale(.85);}

/* STORY VIEWER */
#story-viewer{position:fixed;inset:0;z-index:200;background:#000;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .2s;}
#story-viewer.open{opacity:1;pointer-events:all;}
.sv-progress{display:flex;gap:3px;padding:12px 12px 0;flex-shrink:0;}
.sv-bar{flex:1;height:2.5px;border-radius:2px;background:rgba(255,255,255,.25);overflow:hidden;}
.sv-fill{height:100%;width:0;background:#fff;}
.sv-fill.run{transition:width linear;}
.sv-hdr{display:flex;align-items:center;gap:10px;padding:8px 12px 0;flex-shrink:0;}
.sv-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--g),var(--cy));display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:900;color:#000;overflow:hidden;position:relative;flex-shrink:0;}
.sv-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.sv-user{font-size:.85rem;font-weight:700;color:#fff;flex:1;}
.sv-time{font-size:.65rem;color:rgba(255,255,255,.6);}
.sv-close{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.8);font-size:1.3rem;}
.sv-body{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.sv-body img{width:100%;height:100%;object-fit:contain;position:absolute;}
.sv-texto{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.8));padding:40px 20px 20px;font-size:1rem;font-weight:600;color:#fff;text-align:center;line-height:1.4;}
.sv-empty{position:absolute;font-size:4rem;text-align:center;}
.sv-tap-l,.sv-tap-r{position:absolute;top:0;bottom:0;width:40%;z-index:2;}
.sv-tap-l{left:0;}.sv-tap-r{right:0;}
/* Creator */
.sv-create{position:absolute;inset:0;background:var(--bg1);display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:30px;}
.sv-create.show{display:flex;}
.sv-create-img{width:100%;max-height:50vh;border-radius:16px;object-fit:contain;display:none;}
.sv-create-ph{width:120px;height:120px;border-radius:20px;background:var(--bg2);border:2px dashed var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--txt3);font-size:.8rem;}
.sv-create-ph ion-icon{font-size:2.5rem;}
.sv-create-pub{padding:12px 28px;border-radius:14px;background:var(--g);color:#000;font-weight:800;font-size:.9rem;box-shadow:0 4px 16px var(--g-glow);}
.sv-create-pub:active{opacity:.8;}
.sv-create-txt{width:100%;padding:12px 16px;border-radius:12px;background:var(--bg2);border:1px solid var(--bd);color:var(--txt);font-size:.9rem;outline:none;text-align:center;}
.sv-create-txt::placeholder{color:var(--txt3);}

/* LIGHTBOX */
#lightbox{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
#lightbox.open{opacity:1;pointer-events:all;}
#lightbox img{max-width:96vw;max-height:92vh;border-radius:12px;object-fit:contain;}
#lightbox-close{position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.2rem;}

/* MODAL */
.modal-ov{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s;}
.modal-ov.show{opacity:1;visibility:visible;}
.modal-sheet{width:100%;background:var(--bg1);border-radius:20px 20px 0 0;border:1px solid var(--bd);border-bottom:none;padding:20px 20px 32px;transform:translateY(100%);transition:transform .3s var(--spring);display:flex;flex-direction:column;gap:14px;}
.modal-ov.show .modal-sheet{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 4px;}
.modal-ico{font-size:2.2rem;text-align:center;}
.modal-title{font-size:1rem;font-weight:800;text-align:center;}
.modal-body{font-size:.82rem;color:var(--txt2);line-height:1.6;text-align:center;}
.modal-btn{width:100%;padding:13px;border-radius:13px;font-size:.88rem;font-weight:800;transition:opacity .15s;}
.modal-btn.danger{background:rgba(255,67,67,.12);color:#ff5555;border:1px solid rgba(255,67,67,.2);}
.modal-btn.secondary{background:var(--bg2);color:var(--txt2);border:1px solid var(--bd);}
.modal-btn:active{opacity:.8;}

/* TOAST */
#toast-box{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);z-index:9999;pointer-events:none;display:flex;flex-direction:column;gap:6px;align-items:center;}
.toast-item{background:var(--bg3);color:var(--txt);padding:9px 18px;border-radius:999px;font-size:.78rem;font-weight:700;border:1px solid var(--bd);white-space:nowrap;animation:toastIn .28s var(--spring);box-shadow:0 6px 20px rgba(0,0,0,.5);}
@keyframes toastIn{from{opacity:0;transform:translateY(6px) scale(.94)}to{opacity:1;transform:none}}
.toast-item.out{animation:toastOut .25s var(--ease) forwards;}
@keyframes toastOut{to{opacity:0;transform:translateY(3px) scale(.95)}}
input[type="file"]{display:none;}
  </style>
</head>
<body>

<input type="file" id="file-chat" accept="image/*">
<input type="file" id="file-story" accept="image/*">

<!-- тХРтХРтХРтХР LISTA тХРтХРтХРтХР -->
<div id="view-list">
  <header class="hdr">
    <a href="./biblioteca.html" class="hdr-btn"><ion-icon name="arrow-back-outline"></ion-icon></a>
    <div class="hdr-logo"><span class="up">UP</span><span class="gm">GAMES</span></div>
    <div style="flex:1"></div>
    <span style="font-size:.85rem;font-weight:800">Mensajes</span>
    <div id="hdr-badge" style="display:none;background:var(--g);color:#000;font-size:.6rem;font-weight:900;min-width:18px;height:18px;border-radius:999px;align-items:center;justify-content:center;padding:0 5px;margin-left:4px">0</div>
  </header>

  <!-- STORIES -->
  <div class="stories-bar" id="stories-bar">
    <div class="stories-scroll" id="stories-scroll">

<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
<script>
const API   = 'https://upgames-production.up.railway.app';
const ME    = localStorage.getItem('user_admin')||'';
const TOKEN = localStorage.getItem('token')||'';
if(!ME||!TOKEN) location.replace('../index.html');

let contact=null, contacts=[], polling=null, lastTs=0, pendingImg=null, emojiOpen=false;
let svList=[], svIdx=0, svTimer=null, svCreateImg=null;
const DUR=5000;

/* тФАтФА HELPERS тФАтФА */
const aH  = ()=>({'Content-Type':'application/json','Authorization':`Bearer ${TOKEN}`});
const esc = s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const aL  = u=>(u||'?')[0].toUpperCase();
const fN  = n=>n>=1000?(n/1000).toFixed(1)+'k':n;

function fmtT(iso){const d=new Date(iso),n=new Date(),diff=n-d,M=60000,H=3600000,D=86400000;if(diff<M)return'ahora';if(diff<H)return Math.floor(diff/M)+'m';if(diff<D)return d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});if(diff<D*2)return'ayer';if(diff<D*7)return['Dom','Lun','Mar','Mi├й','Jue','Vie','S├бb'][d.getDay()];return d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'});}
function fmtH(iso){return new Date(iso).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});}
function fmtDS(iso){const d=new Date(iso),n=new Date(),diff=n-d;if(diff<86400000&&n.getDate()===d.getDate())return'Hoy';if(diff<172800000)return'Ayer';return d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});}
function toast(msg,dur=2600){const b=document.getElementById('toast-box'),t=document.createElement('div');t.className='toast-item';t.textContent=msg;b.appendChild(t);setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),280);},dur);}

/* тФАтФА MODAL тФАтФА */
function showModal(ico,title,body,cb){document.getElementById('modal-ico').textContent=ico;document.getElementById('modal-title').textContent=title;document.getElementById('modal-body').innerHTML=body;document.getElementById('modal-ok').onclick=()=>{closeModal();cb&&cb();};document.getElementById('modal').classList.add('show');}
function closeModal(){document.getElementById('modal').classList.remove('show');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

/* тФАтФА LISTA CONVERSACIONES тФАтФА */
async function loadList(){try{const r=await fetch(`${API}/chat/conversaciones`,{headers:aH()});if(!r.ok){if(r.status===401)location.replace('../index.html');return;}const d=await r.json();if(!d.success)return;contacts=d.conversaciones||[];renderList(document.getElementById('list-search')?.value||'');updBadge();}catch(_){}}
function updBadge(){const t=contacts.reduce((s,c)=>s+(c.noLeidos||0),0);const el=document.getElementById('hdr-badge');if(t>0){el.textContent=t>99?'99+':t;el.style.display='flex';}else el.style.display='none';}
function renderList(q=''){const list=document.getElementById('conv-list');const f=q?contacts.filter(c=>c.contacto.toLowerCase().includes(q.toLowerCase())):contacts;if(!f.length){list.innerHTML=`<div class="conv-empty"><ion-icon name="chatbubbles-outline"></ion-icon><h3>${q?'Sin resultados':'Sin conversaciones'}</h3><p>${q?'No hay chats que coincidan.':'Sigue a alguien y empieza a chatear.'}</p></div>`;return;}list.innerHTML='';f.forEach(c=>{const unread=c.noLeidos>0,mine=c.ultimoMensaje?.de===ME,div=document.createElement('div');div.className=`conv-item${unread?' unread':''}`;div.onclick=()=>openChat(c.contacto);const last=c.ultimoMensaje?.imagen&&!c.ultimoMensaje?.texto?'ЁЯУ╖ Imagen':esc(c.ultimoMensaje?.texto||'');div.innerHTML=`<div class="c-av">${aL(c.contacto)}</div><div class="c-body"><div class="c-row1"><div class="c-name">@${esc(c.contacto)}</div><div class="c-time">${c.ultimoMensaje?fmtT(c.ultimoMensaje.fecha):''}</div></div><div class="c-row2"><div class="c-last${mine?' mine':''}">${last}</div>${unread?`<div class="c-badge">${c.noLeidos>9?'9+':c.noLeidos}</div>`:''}</div></div>`;list.appendChild(div);});}
function filterList(q){renderList(q);}

/* тФАтФА CHAT тФАтФА */
async function openChat(c){contact=c;lastTs=0;document.getElementById('chat-name').textContent='@'+c;document.getElementById('chat-status').textContent='CargandoтАж';const av=document.getElementById('chat-av');av.textContent=aL(c);av.style.background='linear-gradient(135deg,var(--g),var(--cy))';document.getElementById('view-chat').classList.add('open');document.getElementById('chat-messages').innerHTML='';closeEmoji();removeImg();await loadMsgs();document.getElementById('chat-status').textContent='En l├нnea';startPoll();}
function closeChat(){stopPoll();contact=null;document.getElementById('view-chat').classList.remove('open');loadList();}

async function loadMsgs(){if(!contact)return;try{const url=lastTs?`${API}/chat/mensajes/${contact}?desde=${lastTs}`:`${API}/chat/mensajes/${contact}`;const r=await fetch(url,{headers:aH()});const d=await r.json();if(!d.success)return;const msgs=d.mensajes||[];if(!msgs.length&&!lastTs){document.getElementById('chat-messages').innerHTML=`<div style="margin:auto;text-align:center;padding:40px 20px;color:var(--txt3);font-size:.8rem;line-height:1.6"><div style="font-size:2.5rem;margin-bottom:12px">ЁЯСЛ</div><p>Empieza la conversaci├│n</p></div>`;return;}if(lastTs)appendMsgs(msgs);else renderMsgs(msgs);if(msgs.length)lastTs=Math.max(...msgs.map(m=>new Date(m.fecha).getTime()));}catch(_){}}

function renderMsgs(msgs){const c=document.getElementById('chat-messages');c.innerHTML='';let ld='';msgs.forEach((m,i)=>{const ds=fmtDS(m.fecha);if(ds!==ld){ld=ds;c.appendChild(mkSep(ds));}const nx=msgs[i+1];const st=!nx||nx.de!==m.de||(new Date(nx.fecha)-new Date(m.fecha))>180000;c.appendChild(mkBub(m,st));});c.scrollTop=c.scrollHeight;}
function appendMsgs(msgs){const c=document.getElementById('chat-messages');const em=c.querySelector('div[style*="margin:auto"]');if(em)em.remove();msgs.forEach(m=>{const ds=fmtDS(m.fecha);const ls=c.querySelector('.msg-date-sep:last-of-type');if(!ls||ls.textContent!==ds)c.appendChild(mkSep(ds));c.appendChild(mkBub(m,true));});c.scrollTop=c.scrollHeight;const recv=msgs.filter(m=>m.de!==ME);if(recv.length&&document.hidden&&Notification.permission==='granted'){const last=recv[recv.length-1];new Notification(`ЁЯТм Mensaje de @${last.de}`,{body:last.imagen?'ЁЯУ╖ Imagen':last.texto.substring(0,80),icon:'/favicon.png',tag:'chat-'+last.de,renotify:true});}}
function mkSep(t){const d=document.createElement('div');d.className='msg-date-sep';d.textContent=t;return d;}
function mkBub(m,st){const mine=m.de===ME;const w=document.createElement('div');w.className=`msg-wrap ${mine?'sent':'recv'}`;w.dataset.id=m.id;let html='';if(m.imagen){html=`<div class="msg-img" onclick="openLB('${esc(m.imagen)}')"><img src="${esc(m.imagen)}" alt="imagen" loading="lazy"></div>`;if(m.texto)html+=`<div class="msg-bub" style="margin-top:3px">${esc(m.texto).replace(/\n/g,'<br>')}</div>`;}else{html=`<div class="msg-bub">${esc(m.texto).replace(/\n/g,'<br>')}</div>`;}w.innerHTML=html+(st?`<div class="msg-time">${fmtH(m.fecha)}${mine?`<ion-icon name="${m.leido?'checkmark-done':'checkmark'}-outline" class="msg-check" style="color:${m.leido?'var(--cy)':'var(--txt3)'}"></ion-icon>`:''}</div>`:'');return w;}
function startPoll(){stopPoll();polling=setInterval(loadMsgs,3000);}
function stopPoll(){if(polling){clearInterval(polling);polling=null;}}

/* тФАтФА ENVIAR тФАтФА */
async function sendMsg(){if(!contact)return;const inp=document.getElementById('chat-input');const text=inp.value.trim();if(!text&&!pendingImg)return;const btn=document.getElementById('btn-send');btn.disabled=true;inp.value='';inp.style.height='auto';let imgUrl='';if(pendingImg){try{const r=await fetch(`${API}/chat/imagen`,{method:'POST',headers:aH(),body:JSON.stringify({imagen:pendingImg})});const d=await r.json();if(d.success)imgUrl=d.url;else toast('тЭМ Error al subir imagen');}catch(_){toast('тЭМ Error de conexi├│n');btn.disabled=false;return;}removeImg();}const tid='tmp-'+Date.now();const tm={id:tid,de:ME,texto:text,imagen:imgUrl,leido:false,fecha:new Date().toISOString()};appendMsgs([tm]);const ta=lastTs;lastTs=Date.now();try{const r=await fetch(`${API}/chat/enviar`,{method:'POST',headers:aH(),body:JSON.stringify({para:contact,texto:text,imagen:imgUrl})});const d=await r.json();if(!d.success){document.querySelector(`[data-id="${tid}"]`)?.remove();lastTs=ta;inp.value=text;toast('тЭМ '+(d.error||'Error'));}else lastTs=new Date(d.mensaje.fecha).getTime();}catch(_){document.querySelector(`[data-id="${tid}"]`)?.remove();lastTs=ta;inp.value=text;toast('тЭМ Sin conexi├│n');}finally{btn.disabled=false;}}
function autoH(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}

/* тФАтФА IMAGEN ADJUNTA тФАтФА */
document.getElementById('file-chat').addEventListener('change',function(){const f=this.files[0];if(!f)return;if(f.size>5*1024*1024){toast('тЭМ Imagen muy grande (m├бx 5MB)');return;}const r=new FileReader();r.onload=e=>{pendingImg=e.target.result;document.getElementById('preview-thumb').src=pendingImg;document.getElementById('preview-name').textContent=f.name;document.getElementById('img-preview').classList.add('show');document.getElementById('chat-input').focus();};r.readAsDataURL(f);this.value='';});

/* тФАтФА EMOJI тФАтФА */
const EMOJIS={'ЁЯША':['ЁЯША','ЁЯШГ','ЁЯШД','ЁЯШБ','ЁЯШЖ','ЁЯдг','ЁЯШВ','ЁЯШК','ЁЯШЗ','ЁЯе░','ЁЯШН','ЁЯдй','ЁЯШШ','ЁЯШЧ','ЁЯШЪ','ЁЯШЩ','ЁЯШЛ','ЁЯШЫ','ЁЯШЬ','ЁЯдк','ЁЯШЭ','ЁЯдС','ЁЯдЧ','ЁЯдн','ЁЯдл','ЁЯдФ','ЁЯдР','ЁЯШР','ЁЯШС','ЁЯШ╢','ЁЯШП','ЁЯШТ','ЁЯЩД','ЁЯШм','ЁЯде','ЁЯШМ','ЁЯШФ','ЁЯШк','ЁЯдд','ЁЯШ┤','ЁЯШ╖','ЁЯдТ','ЁЯдХ','ЁЯдв','ЁЯдз','ЁЯе╡','ЁЯе╢','ЁЯШ╡','ЁЯдп','ЁЯе│','ЁЯШО','ЁЯдУ','ЁЯШЯ','ЁЯШХ','ЁЯШг','ЁЯШЦ','ЁЯШл','ЁЯШй','ЁЯе║','ЁЯШв','ЁЯШн','ЁЯШд','ЁЯШа','ЁЯШб','ЁЯдм','ЁЯШИ','ЁЯС┐','ЁЯТА','тШая╕П','ЁЯТй','ЁЯдб','ЁЯС╗','ЁЯС╛','ЁЯдЦ'],'ЁЯСН':['ЁЯСН','ЁЯСО','ЁЯСМ','ЁЯдМ','тЬМя╕П','ЁЯдЮ','ЁЯдЯ','ЁЯдШ','ЁЯдЩ','ЁЯСИ','ЁЯСЙ','ЁЯСЖ','ЁЯСЗ','тШЭя╕П','ЁЯСЛ','ЁЯдЪ','ЁЯЦРя╕П','тЬЛ','ЁЯСП','ЁЯЩП','ЁЯдЭ','ЁЯТк','ЁЯж╛','тЭдя╕П','ЁЯзб','ЁЯТЫ','ЁЯТЪ','ЁЯТЩ','ЁЯТЬ','ЁЯЦд','ЁЯдН','ЁЯТФ','ЁЯТХ','ЁЯТЮ','ЁЯТУ','ЁЯТЧ','ЁЯТЦ','ЁЯТШ','ЁЯТЭ'],'ЁЯФе':['ЁЯФе','тЬи','тнР','ЁЯМЯ','ЁЯТл','тЪб','ЁЯОЙ','ЁЯОК','ЁЯОБ','ЁЯПЖ','ЁЯеЗ','ЁЯОо','ЁЯХ╣я╕П','ЁЯОп','ЁЯО▓','ЁЯТп','тА╝я╕П','тБЙя╕П','ЁЯТе','ЁЯМИ','ЁЯО╢','ЁЯО╡','ЁЯОд','ЁЯУ▒','ЁЯТ╗','ЁЯЦея╕П','тМия╕П','ЁЯЦ▒я╕П'],'ЁЯР╢':['ЁЯР╢','ЁЯР▒','ЁЯРн','ЁЯР░','ЁЯжК','ЁЯР╗','ЁЯР╝','ЁЯРи','ЁЯРп','ЁЯжБ','ЁЯРо','ЁЯР╖','ЁЯР╕','ЁЯР╡','ЁЯРФ','ЁЯРз','ЁЯжЖ','ЁЯжЕ','ЁЯжЙ','ЁЯР║','ЁЯР┤','ЁЯжД','ЁЯРЭ','ЁЯРЫ','ЁЯжЛ','ЁЯРМ','ЁЯРЮ','ЁЯРв','ЁЯРН','ЁЯжО','ЁЯРЩ','ЁЯжС','ЁЯРб','ЁЯРа','ЁЯРЯ','ЁЯРм','ЁЯР│','ЁЯжИ','ЁЯРК','ЁЯРЕ','ЁЯРЖ','ЁЯжУ','ЁЯжТ','ЁЯжШ','ЁЯРШ','ЁЯжЫ','ЁЯжП','ЁЯРХ','ЁЯРИ'],'ЁЯНХ':['ЁЯНХ','ЁЯНФ','ЁЯМо','ЁЯМп','ЁЯеЧ','ЁЯНЬ','ЁЯНЭ','ЁЯНЫ','ЁЯНг','ЁЯН▒','ЁЯеЯ','ЁЯНд','ЁЯНЩ','ЁЯНЪ','ЁЯНШ','ЁЯзБ','ЁЯОВ','ЁЯН░','ЁЯез','ЁЯНо','ЁЯНн','ЁЯНм','ЁЯНл','ЁЯН┐','ЁЯНй','ЁЯНк','ЁЯНп','тШХ','ЁЯН╡','ЁЯзЛ','ЁЯН║','ЁЯН╗','ЁЯеВ','ЁЯН╖','ЁЯеГ','ЁЯН╕','ЁЯН╣','ЁЯН╛'],'тЪ╜':['тЪ╜','ЁЯПА','ЁЯПИ','тЪ╛','ЁЯО╛','ЁЯПР','ЁЯПЙ','ЁЯО▒','ЁЯПУ','ЁЯП╕','ЁЯеЕ','тЫ│','ЁЯОг','ЁЯО╜','ЁЯО┐','ЁЯЫ╖','ЁЯПЛя╕П','ЁЯд╕','тЫ╣я╕П','ЁЯд║','ЁЯеК','ЁЯеЛ','ЁЯПМя╕П','ЁЯПЗ','ЁЯзШ','ЁЯПД','ЁЯЪ╡','ЁЯзЧ','ЁЯПК','ЁЯЪ┤']};

function fillGrid(emojis){const g=document.getElementById('emoji-grid');g.innerHTML='';emojis.forEach(em=>{const b=document.createElement('button');b.className='emoji-btn';b.textContent=em;b.onclick=()=>insertEmoji(em);g.appendChild(b);});}
function insertEmoji(em){const inp=document.getElementById('chat-input'),s=inp.selectionStart,e=inp.selectionEnd;inp.value=inp.value.slice(0,s)+em+inp.value.slice(e);inp.selectionStart=inp.selectionEnd=s+em.length;autoH(inp);inp.focus();}
function toggleEmoji(){emojiOpen=!emojiOpen;document.getElementById('emoji-panel').classList.toggle('open',emojiOpen);document.getElementById('btn-emoji').style.color=emojiOpen?'var(--g)':'';}
function closeEmoji(){emojiOpen=false;document.getElementById('emoji-panel').classList.remove('open');document.getElementById('btn-emoji').style.color='';}
document.getElementById('chat-messages').addEventListener('click',()=>{if(emojiOpen)closeEmoji();});

/* тФАтФА STORIES VIEWER тФАтФА */
async function loadStories(){try{const r=await fetch(`${API}/stories/seguidos`,{headers:aH()});const d=await r.json();if(!d.success||!d.stories?.length)return;svList=d.stories;renderStoriesBar(d.stories);}catch(_){}}
function renderStoriesBar(stories){const sc=document.getElementById('stories-scroll');while(sc.children.length>1)sc.removeChild(sc.lastChild);const mine=stories.find(s=>s.usuario===ME);const mi=document.getElementById('my-story-inner');if(mine?.foto){mi.innerHTML=`<img src="${mine.foto}" alt="${ME}"><div class="story-add">+</div>`;}stories.forEach((s,i)=>{if(s.usuario===ME)return;const item=document.createElement('div');item.className='story-item';item.onclick=()=>openViewer(i);item.innerHTML=`<div class="story-ring${s.visto?' seen':''}"><div class="story-inner" style="background:var(--bg3)">${s.foto?`<img src="${s.foto}" alt="${s.usuario}" loading="lazy">`:'<span style="color:var(--txt2);font-size:1.1rem;font-weight:900">'+aL(s.usuario)+'</span>'}</div></div><div class="story-name">@${esc(s.usuario)}</div>`;sc.appendChild(item);});}
function openViewer(i){svIdx=i;document.getElementById('story-viewer').classList.add('open');showStory();}
function showStory(){if(svIdx<0||svIdx>=svList.length){closeViewer();return;}clearTimeout(svTimer);const s=svList[svIdx];document.getElementById('sv-user').textContent='@'+s.usuario;document.getElementById('sv-time').textContent=fmtT(s.fecha);const av=document.getElementById('sv-av');av.innerHTML=s.foto?`<img src="${s.foto}" alt="">`:aL(s.usuario);const img=document.getElementById('sv-img'),txt=document.getElementById('sv-text'),empty=document.getElementById('sv-empty');if(s.imagen){img.src=s.imagen;img.style.display='block';}else img.style.display='none';txt.textContent=s.texto||'';empty.style.display=(!s.imagen&&!s.texto)?'block':'none';buildBars();if(s.id&&!s.visto){fetch(`${API}/stories/${s.id}/ver`,{method:'POST',headers:aH()}).catch(()=>{});s.visto=true;}svTimer=setTimeout(svNext,DUR);}
function buildBars(){const p=document.getElementById('sv-prog');p.innerHTML='';svList.forEach((s,i)=>{const bar=document.createElement('div');bar.className='sv-bar';const fill=document.createElement('div');fill.className='sv-fill';if(i<svIdx){fill.style.width='100%';}else if(i===svIdx){fill.classList.add('run');fill.style.transition=`width ${DUR}ms linear`;requestAnimationFrame(()=>{fill.style.width='100%';});}bar.appendChild(fill);p.appendChild(bar);});}
function svNext(){svIdx++;if(svIdx>=svList.length)closeViewer();else showStory();}
function svPrev(){clearTimeout(svTimer);if(svIdx>0){svIdx--;showStory();}}
function closeViewer(){clearTimeout(svTimer);document.getElementById('story-viewer').classList.remove('open');document.getElementById('sv-create').classList.remove('show');loadStories();}

/* тФАтФА STORY CREATOR тФАтФА */
function openCreator(){svCreateImg=null;document.getElementById('sv-cimg').style.display='none';document.getElementById('sv-cph').style.display='flex';document.getElementById('sv-ctxt').value='';document.getElementById('sv-img').style.display='none';document.getElementById('sv-text').textContent='';document.getElementById('sv-empty').style.display='none';document.getElementById('sv-create').classList.add('show');document.getElementById('sv-user').textContent='@'+ME+' ┬╖ Nueva historia';document.getElementById('sv-time').textContent='ahora';document.getElementById('sv-prog').innerHTML='';document.getElementById('sv-av').textContent=aL(ME);document.getElementById('story-viewer').classList.add('open');}
document.getElementById('file-story').addEventListener('change',function(){const f=this.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{svCreateImg=e.target.result;const img=document.getElementById('sv-cimg');img.src=svCreateImg;img.style.display='block';document.getElementById('sv-cph').style.display='none';};r.readAsDataURL(f);this.value='';});
async function pubStory(){const texto=document.getElementById('sv-ctxt').value.trim();if(!svCreateImg&&!texto){toast('тЭМ Agrega una imagen o texto');return;}const btn=document.querySelector('.sv-create-pub');btn.textContent='PublicandoтАж';btn.disabled=true;try{const r=await fetch(`${API}/stories/crear`,{method:'POST',headers:aH(),body:JSON.stringify({imagen:svCreateImg||'',texto})});const d=await r.json();if(d.success){toast('тЬЕ Historia publicada!');closeViewer();}else toast('тЭМ '+(d.error||'Error'));}catch(_){toast('тЭМ Sin conexi├│n');}finally{btn.textContent='Publicar historia тЬи';btn.disabled=false;}}

/* тФАтФА DISCOVER тФАтФА */
async function loadDiscover(){try{const r=await fetch(`${API}/usuarios/descubrir?limite=10`,{headers:aH()});const d=await r.json();if(!d.success||!d.usuarios?.length){document.getElementById('discover-section').style.display='none';return;}renderDiscover(d.usuarios);const dias=['Dom','Lun','Mar','Mi├й','Jue','Vie','S├бb'],hoy=new Date();document.getElementById('discover-day').textContent=dias[hoy.getDay()]+' ┬╖ '+hoy.getDate();}catch(_){document.getElementById('discover-section').style.display='none';}}
function renderDiscover(users){const sc=document.getElementById('discover-scroll');sc.innerHTML='';users.forEach(u=>{const c=document.createElement('div');c.className='d-card';c.innerHTML=`<div class="d-av">${aL(u.usuario)}${u.foto?`<img src="${esc(u.foto)}" alt="" loading="lazy" onerror="this.remove()">`:''}</div><div class="d-name">@${esc(u.usuario)}</div><div class="d-subs"><span>${fN(u.seguidores||0)}</span> seg.</div><button class="d-btn" onclick="dChat('${esc(u.usuario)}',event)"><ion-icon name="chatbubble-outline"></ion-icon> Mensaje</button>`;sc.appendChild(c);});}
function dChat(u,e){e.stopPropagation();openChat(u);}

/* тФАтФА ACCIONES тФАтФА */
function goProfile(){if(contact)location.href=`./perfil-publico.html?usuario=${encodeURIComponent(contact)}`;}
function delChat(){showModal('ЁЯЧСя╕П','Borrar mensajes',`┬┐Eliminar todos los mensajes con <strong style="color:var(--g)">@${contact}</strong>?`,async()=>{try{await fetch(`${API}/chat/conversacion/${contact}`,{method:'DELETE',headers:aH()});toast('ЁЯЧСя╕П Mensajes eliminados');document.getElementById('chat-messages').innerHTML=`<div style="margin:auto;text-align:center;padding:40px 20px;color:var(--txt3);font-size:.8rem;line-height:1.6"><div style="font-size:2.5rem;margin-bottom:12px">ЁЯСЛ</div><p>Conversaci├│n vac├нa.<br>Empieza de nuevo.</p></div>`;lastTs=0;}catch(_){toast('тЭМ Error al borrar');}});}
function vaciarTodo(){if(!contacts.length){toast('No hay chats');return;}showModal('тЪая╕П','Vaciar todos los chats',`┬┐Eliminar <strong style="color:#ff4343">todos</strong> los mensajes de <strong>${contacts.length}</strong> conversaciones?`,async()=>{await Promise.all(contacts.map(c=>fetch(`${API}/chat/conversacion/${c.contacto}`,{method:'DELETE',headers:aH()})));toast('тЬЕ Todos eliminados');contacts=[];renderList();});}

/* тФАтФА INIT тФАтФА */
async function init(){if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();buildEmoji();await loadList();loadDiscover();loadStories();setInterval(loadList,8000);setInterval(loadStories,30000);const t=new URLSearchParams(location.search).get('usuario');if(t?.trim())setTimeout(()=>openChat(t.trim()),120);}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
